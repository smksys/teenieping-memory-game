              - paragraph [ref=e727]: Teeheeping and Trustping wanting more chocolate balls
            - paragraph [ref=e728]:
              - text: Trustping was eating the chocolate balls made by
              - link "Ian" [ref=e729] [cursor=pointer]:
                - /url: /wiki/Ian
              - text: along with other
              - link "Royal Teeniepings" [ref=e730] [cursor=pointer]:
                - /url: /wiki/Royal_Teeniepings
              - text: . They were so delicious that made him and
              - link "Teeheeping" [ref=e731] [cursor=pointer]:
                - /url: /wiki/Teeheeping
              - text: want to eat more, but stopped by
              - link "Romi" [ref=e732] [cursor=pointer]:
                - /url: /wiki/Romi
              - text: . He begs for one more, but he gives up because
              - link "Heartsping" [ref=e733] [cursor=pointer]:
                - /url: /wiki/Heartsping
              - text: tells him it's time to go to bed.
            - figure "Trustping dreaming about chocolate balls" [ref=e734]:
              - link "Trustping dreaming about chocolate balls view image" [ref=e735] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/8/81/S2E04_-_Trustping_dreaming_about_the_treats.jpg/revision/latest?cb=20250316030526
                - img "Trustping dreaming about chocolate balls" [ref=e736]
                - generic "view image" [ref=e739]:
                  - img [ref=e740]
              - paragraph [ref=e743]: Trustping dreaming about chocolate balls
            - paragraph [ref=e744]:
              - text: However, even while he is sleeping, he still hallucinates the chocolate balls, and when he looks at the chocolate balls, and can't bear it. He ends up eating too many chocolate balls in the kitchen and goes to bed without brushing his teeth. The next day, he gets a cavity, and
              - link "Heartsping" [ref=e745] [cursor=pointer]:
                - /url: /wiki/Heartsping
              - text: ","
              - link "Joahping" [ref=e746] [cursor=pointer]:
                - /url: /wiki/Joahping
              - text: ", and"
              - link "Teeheeping" [ref=e747] [cursor=pointer]:
                - /url: /wiki/Teeheeping
              - text: try to treat him.
            - paragraph [ref=e748]:
              - text: But because of
              - link "Owwping" [ref=e749] [cursor=pointer]:
                - /url: /wiki/Owwping
              - text: "'s spell, when the mirror's light reflects on Heartsping's eyes, she screams and her head mirror also reflects light on Joahping and Teeheeping, they also scream in pain. he hurriedly places them on hospital beds, but he doesn't know what's going on, and in fact, he cannot receive treatment."
            - paragraph [ref=e750]:
              - text: When
              - link "Romi" [ref=e751] [cursor=pointer]:
                - /url: /wiki/Romi
              - text: returns, he informs her that everyone (he thinks) is in pain and realizes that this was
              - link "Owwping" [ref=e752] [cursor=pointer]:
                - /url: /wiki/Owwping
              - text: "'s doing. Until this time, he thought they were sick, but when he found out that it was a spell due to Owwping's actions, he was embarrassed and turned Romi into Princess Sapphire despite his cavity to catch Owwping."
            - paragraph [ref=e753]: Driven by a desire for revenge, he chases Owwping, and while trying to catch up with Owwping, he steps on Heartsping, Joahping, and Teeheeping after Owwping did the same. Then, he finally pushes her into a corner, but when Owwping gets scared, Princess Sapphire stops him and persuades Owwping. When Owwping resists, saying that it will hurt, he helps persuade her, saying that it won't hurt at all, and succeeds in catching her.
            - paragraph [ref=e754]: After that, he was completely treated for his cavities by Heartsping and said he would not secretly eat chocolate balls, but even when Romi called him to eat, he secretly tried to eat chocolate balls, and looks like he was unable to give up the chocolate balls.
            - heading "Trustping Has Fainted! Sign in to edit" [level=4] [ref=e755]:
              - link "Trustping Has Fainted!" [ref=e757] [cursor=pointer]:
                - /url: /wiki/Trustping_Has_Fainted!
              - link "Sign in to edit" [ref=e759] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FTrustping%3Fveaction%3Dedit%26section%3D11&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e760]
            - paragraph [ref=e762]:
              - text: It is revealed that Trustping always fights with
              - link "Teeheeping" [ref=e763] [cursor=pointer]:
                - /url: /wiki/Teeheeping
              - text: ", such as Teeheeping intercepting what he was trying to answer during class, eating the leftover tart while blocking her while she was trying to eat it, and playing soccer during gym class. While playing, he was trying to catch a pass, but Teeheeping was fouled with a self-immolation spell on the ball."
            - paragraph [ref=e764]: He was embarrassed and got hit by the ball and a bucket filled with water. The two eventually got into a hand-to-hand fight, and were sent off and sentenced to volunteer work for cleaning. However, while cleaning, he suddenly lost energy and collapsed, and did not recover until the next day.
            - paragraph [ref=e765]:
              - link "Owwping" [ref=e766] [cursor=pointer]:
                - /url: /wiki/Owwping
              - text: ", seeing this, diagnosed him with 'Jewel tomato disease\". While he was lying down, Teeheeping carefully nursed him and worked hard to grow the Jewel tomato tree, so he safely ate the jewel tomatoes and regained his strength."
            - heading "Royal Teenieping Face-Off! Sign in to edit" [level=4] [ref=e767]:
              - link "Royal Teenieping Face-Off!" [ref=e769] [cursor=pointer]:
                - /url: /wiki/Royal_Teenieping_Face-Off!
              - link "Sign in to edit" [ref=e771] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FTrustping%3Fveaction%3Dedit%26section%3D12&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e772]
            - figure "Trustping battling Gogoping" [ref=e774]:
              - link "Trustping battling view image" [ref=e775] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/1/17/S2E15_-_Gogoping_battling_Trustping.png/revision/latest?cb=20241023160036
                - img "Trustping battling" [ref=e776]
                - generic "view image" [ref=e779]:
                  - img [ref=e780]
              - paragraph [ref=e783]:
                - text: Trustping battling
                - link "Gogoping" [ref=e784] [cursor=pointer]:
                  - /url: /wiki/Gogoping
            - paragraph [ref=e785]: Trustping competes against the first generation of Royalpings. Although it was a little difficult at first, he succeeded in winning the final battle, the tower-building battle, and completed the training that the first-generation Royalpings had tried to give him.
            - heading "Twirl Whirl Teenieping Ballet Sign in to edit" [level=4] [ref=e786]:
              - link "Twirl Whirl Teenieping Ballet" [ref=e788] [cursor=pointer]:
                - /url: /wiki/Twirl_Whirl_Teenieping_Ballet
              - link "Sign in to edit" [ref=e790] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FTrustping%3Fveaction%3Dedit%26section%3D13&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e791]
            - paragraph [ref=e793]: Trustping expresses his doubt about learning ballet. He is the only boy among a group of mostly female Teeniepings and sulks about having to participate. In the first class, Trustping struggles to do a simple arm stretch, leading Balletping to try and straighten him out. He also jumps very high but doesn't land gracefully, and Balletping scolds him for it. She tells him to practice until he gets it right, and he's left behind.
            - paragraph [ref=e794]: When trying to walk on his tippy-toes, Trustping struggles to balance and knocks over the other Teeniepings. After some time, he's still struggling, and Balletping walks away without acknowledging his efforts.
            - paragraph [ref=e795]: Trustping is still struggling later that day. He tries to eat a chocolate ball he had saved, but Balletping appears and slaps it out of his hands, scolding him. This is the last straw for Trustping, who takes off his ballet shoes and throws them on the ground. He storms off, saying he's not cut out for ballet. He blames the other Teeniepings for inviting him to perform.
            - paragraph [ref=e796]: As Trustping enters the bakery, he sees Balletping dancing alone. He starts to tear up, realizing how hard she works and the potential she wants the other Teeniepings to reach.
            - paragraph [ref=e797]: A few days later, Trustping is part of the ballet performance. He performs the same jump he saw Balletping doing and finishes the performance to the delight of the audience.
            - paragraph [ref=e798]: After the performance, Balletping asks Trustping when he practiced. He says he saw her dance under the moonlight a few days before their performance. Trustping apologizes for being mean to her, and Balletping apologizes for being too tough on him. Trustping offers her a chocolate ball, and they eat together, back on good terms.
            - heading "Secret Catch! Teenieping Sign in to edit" [level=3] [ref=e799]:
