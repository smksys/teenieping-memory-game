                - img [ref=e586]
            - figure "Trustping's Appearance" [ref=e588]:
              - link "Trustping's Appearance view image" [ref=e589] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/0/05/Trustping_Render_5.png/revision/latest?cb=20260201212637
