                  - img [ref=e594]
              - paragraph [ref=e597]: Trustping's Appearance
            - paragraph [ref=e598]: Trustping is a blue sapphire-themed Teenieping.
            - paragraph [ref=e599]: He has light blue fur, blue eyes, a black nose and blue hair in a double-bun style with star-shaped sapphires and some yellow stars on his buns.
            - paragraph [ref=e600]: He also has a blue patch and a white patch on his chest with his Royal Teenieping sign, and he has has a small, yellow tail.
            - paragraph [ref=e601]: His prop is a blue and white stripped umbrella with a crystal star on the end.
            - heading "Personality Sign in to edit" [level=2] [ref=e602]:
              - text: Personality
              - link "Sign in to edit" [ref=e604] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FTrustping%3Fveaction%3Dedit%26section%3D2&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e605]
            - figure "Trustping winking" [ref=e607]:
              - link "Trustping winking view image" [ref=e608] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/2/26/S2E04_-_Trustping_winking_with_his_chocolate_ball.png/revision/latest?cb=20240903210518
                - img "Trustping winking" [ref=e609]
                - generic "view image" [ref=e612]:
                  - img [ref=e613]
              - paragraph [ref=e616]: Trustping winking
            - paragraph [ref=e617]:
              - text: Trustping is faithful, loyal, and dedicated, always rushing to his friends' aid when they need him. His loyalty and care towards his friends makes him selfless, as shown in "
              - link "Ow Ow, No More Boo-Boos!" [ref=e618] [cursor=pointer]:
                - /url: /wiki/Ow_Ow,_No_More_Boo-Boos!
              - text: "\", when he provides treatment for"
              - link "Heartsping" [ref=e619] [cursor=pointer]:
                - /url: /wiki/Heartsping
              - text: ","
              - link "Joahping" [ref=e620] [cursor=pointer]:
                - /url: /wiki/Joahping
              - text: ", and"
              - link "Teeheeping" [ref=e621] [cursor=pointer]:
                - /url: /wiki/Teeheeping
              - text: when they claimed to be in pain and assisting Romi to catch
              - link "Owwping" [ref=e622] [cursor=pointer]:
                - /url: /wiki/Owwping
              - text: ", all while having a toothache. However, his innocence makes him naive and gullible, as he easily believes and trusts things. He can also be immature, like acting before he thinks or getting into arguments with Teeheeping."
            - paragraph [ref=e623]: Throughout the series, Trustping displays a fondness for chocolate balls to the point of having secret stashes of them.
            - heading "Etymology Sign in to edit" [level=2] [ref=e624]:
              - text: Etymology
              - link "Sign in to edit" [ref=e626] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FTrustping%3Fveaction%3Dedit%26section%3D3&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e627]
            - list [ref=e629]:
              - listitem [ref=e630]: The Korean name 믿어핑 ("Mideoping") comes from 믿다 ("Midda"), which means "believe" or "trust".
              - listitem [ref=e631]: The Chinese name 信信萌可 ("Xìn xìn méng kě") comes from 信 ("Xìn"), which means "true", "trustworthy", "trust", or "faith".
              - listitem [ref=e632]: The Japanese name マコピン ("Makopin") comes from 誠/まこと ("Makoto/Makoto"), which has several meanings with some of them being "truth", "sincerity", "faithfulness", and "good faith".
