                - img [ref=e821]
            - list [ref=e823]:
              - listitem [ref=e824]:
                - text: Trustping is said to be the youngest out of the three.
                - superscript [ref=e825]:
                  - link "Reference 1" [ref=e826] [cursor=pointer]:
                    - /url: "#cite_note-1"
                    - text: "[1]"
              - listitem [ref=e827]:
                - text: Trustping is the first
                - link "Jewel Teenieping" [ref=e828] [cursor=pointer]:
                  - /url: /wiki/Jewel_Teeniepings
                - text: to get
                - link "Jewel Tomato Disease" [ref=e829] [cursor=pointer]:
                  - /url: /wiki/Jewel_Tomato_Disease
                - text: .
              - listitem [ref=e830]:
                - text: Trustping is the second male Teenieping to have double buns. The first being
                - link "Noraping" [ref=e831] [cursor=pointer]:
                  - /url: /wiki/Noraping
                - text: and is followed by
                - link "Puffping" [ref=e832] [cursor=pointer]:
                  - /url: /wiki/Puffping
                - text: .
                - list [ref=e833]:
                  - listitem [ref=e834]: However, he's the first Royal Teenieping to do so.
              - listitem [ref=e835]:
                - text: Trustping is the first male
                - link "Royal Teenieping" [ref=e836] [cursor=pointer]:
                  - /url: /wiki/Royal_Teeniepings
                - text: to be voiced by a female voice actor in the Korean dub.
              - listitem [ref=e837]:
                - text: Trustping shares similarities with
                - link "Trueping" [ref=e838] [cursor=pointer]:
                  - /url: /wiki/Trueping
                - text: and
                - link "Princeping" [ref=e839] [cursor=pointer]:
                  - /url: /wiki/Princeping
                - text: as they all are star-themed and are the only male Royal Teeniepings of their respective seasons.
              - listitem [ref=e840]:
                - text: A donut resembling Trustping appears in "
                - link "Sweet Dessert Teeniepings" [ref=e841] [cursor=pointer]:
                  - /url: /wiki/Sweet_Dessert_Teeniepings
                - text: "\"."
