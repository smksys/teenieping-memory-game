            - paragraph [ref=e708]:
              - text: Trustping, along with
              - link "Teeheeping" [ref=e709] [cursor=pointer]:
                - /url: /wiki/Teeheeping
              - text: and
              - link "Joahping" [ref=e710] [cursor=pointer]:
                - /url: /wiki/Joahping
              - text: ", decides to go to Earth to rescue the Jewel Teeniepings after they were sent down there by Maskping. When Romi catches them, they try to run away, but after she saves them, they decide to help her on her mission to rescue the freed Jewel Teeniepings."
            - heading "Ow Ow, No More Boo-Boos! Sign in to edit" [level=4] [ref=e711]:
