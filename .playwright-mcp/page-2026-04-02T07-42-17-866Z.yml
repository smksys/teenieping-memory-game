            - figure "Teeheeping and Trustping wanting more chocolate balls" [ref=e718]:
              - link "Teeheeping and Trustping wanting more chocolate balls view image" [ref=e719] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/4/48/S2E04_-_Trustping_and_Teeheeping_enjoys_Ian%27s_chocoballs.png/revision/latest?cb=20250316072153
