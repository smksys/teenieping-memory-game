              - text: In
              - link "Secret Catch! Teenieping" [ref=e822] [cursor=pointer]:
                - /url: /wiki/Secret_Catch!_Teenieping
              - text: ", she holds some flower jewels on her head and gets a new white tutu-like dress which has a translucent skirt."
            - paragraph [ref=e823]: Her prop becomes a pink heart-shaped perfume bottle, and she equips a pink heart-shaped key.
            - heading "Season 4" [level=3] [ref=e824]
            - figure "Heartsping's S4 Appearance" [ref=e825]:
              - link "Heartsping's S4 Appearance view image" [ref=e826] [cursor=pointer]:
