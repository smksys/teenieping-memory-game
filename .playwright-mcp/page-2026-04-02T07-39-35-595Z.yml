            - paragraph [ref=e956]:
              - text: When transformed, Romi gains physical strength and can use the power of her various
              - link "magic tools" [ref=e957] [cursor=pointer]:
                - /url: /wiki/List_of_magical_inventions
              - text: to carry out her objective.
            - heading "Abilities" [level=3] [ref=e958]
            - heading "Tinkle Puff" [level=4] [ref=e959]:
              - link "Tinkle Puff" [ref=e961] [cursor=pointer]:
                - /url: /wiki/Tinkle_Puff
            - paragraph [ref=e962]: "Heartsping has various powers in each of the seasons she appears in:"
            - heading "Catch! Teenieping" [level=5] [ref=e963]:
              - generic [ref=e964]: Catch! Teenieping
            - figure "Heartsping shining the Reflection of Love" [ref=e965]:
              - link "Heartsping shining the Reflection of Love view image" [ref=e966] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/b/b9/S1E47_-_Heartsping_power.png/revision/latest?cb=20211022081647
                - img "Heartsping shining the Reflection of Love" [ref=e967]
                - generic "view image" [ref=e970]:
                  - img [ref=e971]
              - paragraph [ref=e974]: Heartsping shining the Reflection of Love
            - paragraph [ref=e975]: With her magic hand held mirror, Heartsping can shine the Light of Love, a bright light that can blind and distract people.
            - heading "Twinkle Catch! Teenieping" [level=5] [ref=e976]:
              - generic [ref=e977]: Twinkle Catch! Teenieping
            - figure "Heartsping playing the Melody of Love" [ref=e978]:
              - link "Heartsping playing the Melody of Love view image" [ref=e979] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/0/0b/S2E02_-_Heartsping_power.png/revision/latest?cb=20250321211909
                - img "Heartsping playing the Melody of Love" [ref=e980]
                - generic "view image" [ref=e983]:
                  - img [ref=e984]
              - paragraph [ref=e987]: Heartsping playing the Melody of Love
            - paragraph [ref=e988]: With her magic harp, she can play the Melody of Love which creates a flying pink melody staff able to perform various actions, such as wrapping people, blocking a path with a barrier, and combat an opponent's magic.
            - heading "Secret Catch! Teenieping" [level=5] [ref=e989]:
              - generic [ref=e990]: Secret Catch! Teenieping
            - figure "Heartsping spreading the Scent of Love" [ref=e991]:
              - link "Heartsping spreading the Scent of Love view image" [ref=e992] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/6/6a/S3E03_-_Heartsping_power.png/revision/latest?cb=20230830134821
                - img "Heartsping spreading the Scent of Love" [ref=e993]
                - generic "view image" [ref=e996]:
                  - img [ref=e997]
              - paragraph [ref=e1000]: Heartsping spreading the Scent of Love
            - paragraph [ref=e1001]: With her magic perfume bottle, she can spread the Scent of Love, which takes the form of red petals acting like projectiles. While it can dismiss her opponent's magic by changing the Tinkle Puff's trajectory, it can also hurt them.
            - heading "Dessert Catch! Teenieping" [level=5] [ref=e1002]:
              - generic [ref=e1003]: Dessert Catch! Teenieping
            - figure "Heartsping ringing the Bells of Love" [ref=e1004]:
              - link "Heartsping ringing the Bells of Love view image" [ref=e1005] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/c/ca/S4E03_-_Berry_Heartsping_rings_the_Bells_of_Love.png/revision/latest?cb=20240910085207
                - img "Heartsping ringing the Bells of Love" [ref=e1006]
                - generic "view image" [ref=e1009]:
                  - img [ref=e1010]
              - paragraph [ref=e1013]: Heartsping ringing the Bells of Love
            - paragraph [ref=e1014]: With her hand bell, she can ring the Bell Ring of Love which takes the form of pink music notes acting like projectiles like the Scent of Love. It can dismiss her opponent's magic by sprinkling music notes.
            - heading "Star Catch! Teenieping" [level=5] [ref=e1015]:
              - generic [ref=e1016]: Star Catch! Teenieping
            - figure "Heartsping using the Stardust of Love" [ref=e1017]:
              - link "Heartsping using the Stardust of Love view image" [ref=e1018] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/d/d8/S5E08_-_Heartsping%27s_Tinkle_Puff_in_Season_5.jpg/revision/latest?cb=20250718204111
                - img "Heartsping using the Stardust of Love" [ref=e1019]
                - generic "view image" [ref=e1022]:
                  - img [ref=e1023]
              - paragraph [ref=e1026]: Heartsping using the Stardust of Love
            - paragraph [ref=e1027]: With her glowpuff star pillow, she can use the Stardust of Love. It can be used to dismiss the opponent's magic or to manipulate objects.
            - heading "Princess Catch! Teenieping" [level=5] [ref=e1028]:
              - generic [ref=e1029]: Princess Catch! Teenieping
            - figure "Heartsping using the Mask Pack of Love" [ref=e1030]:
              - link "Heartsping using the Mask Pack of Love view image" [ref=e1031] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/9/94/S6E16_-_Heartsping_using_the_Mask_Pack_of_Love.jpg/revision/latest?cb=20260322004837
                - img "Heartsping using the Mask Pack of Love" [ref=e1032]
                - generic "view image" [ref=e1035]:
                  - img [ref=e1036]
              - paragraph [ref=e1039]: Heartsping using the Mask Pack of Love
            - paragraph [ref=e1040]: With her magic wand, she can send the Mask Pack of Love. It can be used to massage the opponent's face to dismiss their magic.
            - heading "Special Powers" [level=4] [ref=e1041]
            - paragraph [ref=e1042]: Heartsping's tears possess a unique and powerful magic, its true potential hidden until its initial release. Each tear holds the ability to revive and dispel any deadly curse or danger associated with the individual it comes into contact with. This power can be instinctively triggered in times of crisis.
            - figure "Heartsping playing a much stronger Melody of Love." [ref=e1043]:
              - link "Heartsping playing a much stronger Melody of Love. view image" [ref=e1044] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/3/31/S2E21_-_Heartsping_playing_an_enhanced_Lovely_Tune.png/revision/latest?cb=20230830134818
                - img "Heartsping playing a much stronger Melody of Love." [ref=e1045]
                - generic "view image" [ref=e1048]:
                  - img [ref=e1049]
              - paragraph [ref=e1052]: Heartsping playing a much stronger Melody of Love.
            - paragraph [ref=e1053]:
              - text: The golden Royal Teeniepings symbol - the sign of her being a Royal Teenieping - also holds a powerful magic that she can use in dire situations. When activated, her chest glows, and it increases the strength of her main magic power, allowing her for example to break some spells, like the
              - link "Enchanted Flute" [ref=e1054] [cursor=pointer]:
                - /url: /wiki/Enchanted_Flute
              - text: "'s."
            - heading "History" [level=2] [ref=e1055]
            - 'heading "Heartsping: Teenieping of Love" [level=3] [ref=e1056]':
              - 'link "Heartsping: Teenieping of Love" [ref=e1059] [cursor=pointer]':
                - /url: /wiki/Heartsping:_Teenieping_of_Love
            - paragraph [ref=e1060]: TBA
            - heading "Growing Up With Romi" [level=3] [ref=e1061]
            - paragraph [ref=e1062]:
              - text: In Romi's early childhood, Heartsping, as part of her role of Royal Teenieping, is tasked with taking care of her as Romi becomes one of the princesses of the
              - link "Emotions Kingdom" [ref=e1063] [cursor=pointer]:
                - /url: /wiki/Emotions_Kingdom
              - text: .
            - paragraph [ref=e1064]:
              - text: They spend most of their time together along with the other Royal Teeniepings and grow a strong connection. Sometime after this, she develops a competitive rivalry with
              - link "Onlyping" [ref=e1065] [cursor=pointer]:
                - /url: /wiki/Onlyping
              - text: ","
              - link "Jenny" [ref=e1066] [cursor=pointer]:
                - /url: /wiki/Jenny
              - text: "'s personal Teenieping."
            - figure "Heartsping getting caught just in time by Romi" [ref=e1067]:
              - link "Heartsping getting caught just in time by Romi view image" [ref=e1068] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/d/d1/S1E04_-_Heartsping_getting_caught_just_in_time.png/revision/latest?cb=20250320011604
                - img "Heartsping getting caught just in time by Romi" [ref=e1069]
                - generic "view image" [ref=e1072]:
                  - img [ref=e1073]
              - paragraph [ref=e1076]: Heartsping getting caught just in time by Romi
            - paragraph [ref=e1077]:
              - text: When Romi notices strange signals from the
              - link "Cube Chamber" [ref=e1078] [cursor=pointer]:
                - /url: /wiki/Cube_Chamber
              - text: ", she accidentally frees all the Teeniepings, sending them down to Earth into"
              - link "Harmony Town" [ref=e1079] [cursor=pointer]:
                - /url: /wiki/Harmony_Town
              - text: .
            - paragraph [ref=e1080]: At the last moment, Heartsping is saved by Romi, just in time to prevent her from going to Earth. Heartsping settles in Harmony Town with Romi, allowing the latter to repair her mistakes by catching all the Teeniepings.
            - heading "Catch! Teenieping" [level=3] [ref=e1081]:
              - link "Catch! Teenieping" [ref=e1084] [cursor=pointer]:
                - /url: /wiki/Catch!_Teenieping_(season)
            - figure "Heartsping living a new life in the Teenieping House" [ref=e1085]:
              - link "Heartsping living a new life in the Teenieping House view image" [ref=e1086] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/9/9d/S1E03_-_Heartsping_having_tea_with_Charmping.png/revision/latest?cb=20230830134805
                - img "Heartsping living a new life in the Teenieping House" [ref=e1087]
                - generic "view image" [ref=e1090]:
                  - img [ref=e1091]
              - paragraph [ref=e1094]: Heartsping living a new life in the Teenieping House
            - paragraph [ref=e1095]:
              - text: Heartsping gets to live in the
              - link "Teenieping House" [ref=e1096] [cursor=pointer]:
                - /url: /wiki/Teenieping_House
              - text: and stays in the
              - link "Heartrose Bakery" [ref=e1097] [cursor=pointer]:
                - /url: /wiki/Heartrose_Bakery
              - text: ", ready to help Romi at any time of the day by transforming with her into"
              - link "Princess Heart" [ref=e1098] [cursor=pointer]:
                - /url: /wiki/Princesses
              - text: ", joining Romi when she goes to"
              - link "school" [ref=e1099] [cursor=pointer]:
                - /url: /wiki/Harmony_Town_School
              - text: .
            - paragraph [ref=e1100]:
              - text: Heartsping eventually reunites with her Royal Teenieping colleagues, and she lives with them in the Teenieping House. She is sometimes seen spending time with other Teeniepings like
              - link "Charmping" [ref=e1101] [cursor=pointer]:
                - /url: /wiki/Charmping
              - text: and
              - link "Kikiping" [ref=e1102] [cursor=pointer]:
                - /url: /wiki/Kikiping
              - text: .
            - heading "Come Back Home, Heartsping!" [level=4] [ref=e1103]:
              - link "Come Back Home, Heartsping!" [ref=e1105] [cursor=pointer]:
                - /url: /wiki/Come_Back_Home,_Heartsping!
            - figure "Heartsping encountering Luca" [ref=e1106]:
              - link "Heartsping encountering view image" [ref=e1107] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/2/2d/S1E15_-_Heartsping_encountering_Luca.png/revision/latest?cb=20230830134807
                - img "Heartsping encountering" [ref=e1108]
                - generic "view image" [ref=e1111]:
                  - img [ref=e1112]
              - paragraph [ref=e1115]:
                - text: Heartsping encountering
                - link "Luca" [ref=e1116] [cursor=pointer]:
                  - /url: /wiki/Luca
            - paragraph [ref=e1117]: On a rainy day, when Romi accidentally eats her strawberry tart without issuing an apology, Heartsping is furious and decides to run away from Heartrose Bakery.
            - paragraph [ref=e1118]:
              - text: She is found by
              - link "Luca" [ref=e1119] [cursor=pointer]:
                - /url: /wiki/Luca
              - text: who decides to take care of her, and so begins her new, seemingly better, life. Sometime after, she starts to regret this decision, and after learning that Romi got sick trying to find her in the rain, she decides to come back home and reconcile with her.
            - heading "Love Me More" [level=4] [ref=e1120]:
              - link "Love Me More" [ref=e1122] [cursor=pointer]:
                - /url: /wiki/Love_Me_More
            - paragraph [ref=e1123]:
              - text: After
              - link "Tutuping" [ref=e1124] [cursor=pointer]:
                - /url: /wiki/Tutuping
              - text: is caught by Romi, Heartsping is thrown into a feud with her after Romi shows her too much affection. She winds up eating a strawberry tart with lemon juice hidden in it, assuming that Tutuping pulled a prank on her; Tutuping tries to convince her that she was only trying to make her like lemon-flavored treats since she was being picky, which Romi warned her about earlier.
            - paragraph [ref=e1125]: When Tutuping leaves the bakery, she, Romi and Dadaping all go looking for her and save her from a stray cat's attack, where Tutuping can reconcile with Heartsping, putting their feud to rest.
            - heading "The Arrow of Luvping" [level=4] [ref=e1126]:
              - link "The Arrow of Luvping" [ref=e1128] [cursor=pointer]:
                - /url: /wiki/The_Arrow_of_Luvping
            - figure "Heartsping crying over Gogoping's sacrifice" [ref=e1129]:
              - link "Heartsping crying over Gogoping's sacrifice view image" [ref=e1130] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/e/e2/S1E26_-_Heartsping_mourning_Gogoping%27s_death.png/revision/latest?cb=20230830134810
                - img "Heartsping crying over Gogoping's sacrifice" [ref=e1131]
                - generic "view image" [ref=e1134]:
                  - img [ref=e1135]
              - paragraph [ref=e1138]: Heartsping crying over Gogoping's sacrifice
            - paragraph [ref=e1139]:
              - text: Heartsping gets angry with
              - link "Gogoping" [ref=e1140] [cursor=pointer]:
                - /url: /wiki/Gogoping
              - text: after he caused her to drop her favorite tea cup, even though Gogoping got a cut on his leg due to one of the shards of the cup. But when
              - link "Luvping" [ref=e1141] [cursor=pointer]:
                - /url: /wiki/Luvping
              - text: appears to cause trouble in Harmony Town, the two are forced to work together.
            - paragraph [ref=e1142]: When Gogoping inadvertently uses his Tinkle Puff on Heartsping, the latter assumes he did it intentionally. But when he sacrifices himself to protect her from Luvping's magic arrow, Heartsping is devastated, since Luvping's arrows are fatal to Teeniepings.
            - paragraph [ref=e1143]: Heartsping cries over the fact that Gogoping might not be brought back to life, her despair causes her tear magic to activate, curing Luvping's spell and bringing Gogoping back from unconsciousness.
            - heading "Princess Veronica" [level=4] [ref=e1144]:
              - link "Princess Veronica" [ref=e1146] [cursor=pointer]:
                - /url: /wiki/Princess_Veronica
            - paragraph [ref=e1147]:
              - text: Heartsping joins the battle alongside her fellow Royal Teeniepings to stop Egoping's onslaught, but when everything seems lost - and she traps her into one of her magic balls - Heartsping's tear magic once again activates, resuscitating Happying
              - link "after she had sacrificed herself" [ref=e1148] [cursor=pointer]:
                - /url: /wiki/In_The_Name_Of_The_Royalpings
              - text: and activating the transformation of Princess Veronica.
            - paragraph [ref=e1149]: With their reignited powers, she and the other Royal Teeniepings work together to defeat Egoping and catch her. After this, Romi briefly returns to the Emotions Kingdom to celebrate her task being done.
            - paragraph [ref=e1150]: However, Romi asks her parents if she can return to Harmony Town and live life as a normal girl and not as a princess for a time. Her parents allow this, and Heartsping joins her while the other Royal Teeniepings stay behind at the Emotions Kingdom.
            - heading "Twinkle Catch! Teenieping" [level=3] [ref=e1151]:
              - link "Twinkle Catch! Teenieping" [ref=e1154] [cursor=pointer]:
                - /url: /wiki/Twinkle_Catch!_Teenieping
            - figure "Heartsping worried about her students" [ref=e1155]:
              - link "Heartsping worried about her students view image" [ref=e1156] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/f/fb/S2E02_-_Heartsping_worried_about_her_students.png/revision/latest?cb=20230830134812
                - img "Heartsping worried about her students" [ref=e1157]
                - generic "view image" [ref=e1160]:
                  - img [ref=e1161]
              - paragraph [ref=e1164]: Heartsping worried about her students
            - paragraph [ref=e1165]:
              - text: As the other Royal Teeniepings return to the Emotions Kingdom to open the
              - link "Royal Teenieping School" [ref=e1166] [cursor=pointer]:
                - /url: /wiki/Royal_Teenieping_School
              - text: "- a new school to train the next Royal Teeniepings - life changes dramatically."
            - paragraph [ref=e1167]:
              - text: An
              - link "unidentified Teenieping in a mask" [ref=e1168] [cursor=pointer]:
                - /url: /wiki/Maskping
              - text: appears and releases the
              - link "Jewel Teeniepings" [ref=e1169] [cursor=pointer]:
                - /url: /wiki/Jewel_Teeniepings
              - text: ", sending them to Earth. The"
              - link "Royal Teenieping students" [ref=e1170] [cursor=pointer]:
                - /url: /wiki/Royal_Jewel_Teeniepings
              - text: race to Earth to tell Romi and Heartsping about their situation, and Romi equips the
              - link "Jewel Heart Wing Phone" [ref=e1171] [cursor=pointer]:
                - /url: /wiki/Jewel_Heart_Wing_Phone
              - text: ", allowing her to transform and catch the Jewel Teeniepings. This allows Romi to transform for the first time into Princess Diaheart and Heartsping to get an appearance change and to wield the Pink Diamond."
              - link "Dr. Monziu" [ref=e1172] [cursor=pointer]:
                - /url: /wiki/Dr._Monziu
              - text: then tasks Romi, Heartsping, and the student Teenieping with catching the released Teeniepings and restoring the deteriorating Jewel Forest.
            - figure "Heartsping as the school's teacher" [ref=e1173]:
              - link "Heartsping as the school's teacher view image" [ref=e1174] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/8/8d/S2E10_-_Heartsping_as_a_teacher.png/revision/latest?cb=20230830134814
                - img "Heartsping as the school's teacher" [ref=e1175]
                - generic "view image" [ref=e1178]:
                  - img [ref=e1179]
              - paragraph [ref=e1182]: Heartsping as the school's teacher
            - paragraph [ref=e1183]:
              - text: To help train the newbies, Heartsping is assigned as teacher of the Teenieping School, a small school located in
              - link "Heartrose Bakery" [ref=e1184] [cursor=pointer]:
                - /url: /wiki/Heartrose_Bakery
              - text: ", open to all the caught Jewel Teeniepings, where she teaches about both life on Earth and some magic of the Emotions Kingdom."
            - paragraph [ref=e1185]: As she takes charge here, this gives Romi more freedom to go to school on her own (at times). Heartsping's personality also changes as, now that she is in charge of an array of Jewel Teeniepings about the wonders of Earth and the Emotions Kingdom, she gets stricter and more serious as part of her job. Still, though, she commits to helping Romi transform into Princess Diaheart when the situation demands it.
            - heading "Tickle Tickle, Try Not to Laugh!" [level=4] [ref=e1186]:
              - link "Tickle Tickle, Try Not to Laugh!" [ref=e1188] [cursor=pointer]:
                - /url: /wiki/Tickle_Tickle,_Try_Not_to_Laugh!
            - paragraph [ref=e1189]:
              - text: Heartsping teaches the Royal Teenieping students about Teeniepings' tickle spots, which help in catching
              - link "Tickleping" [ref=e1190] [cursor=pointer]:
                - /url: /wiki/Tickleping
              - text: . She brings them in for a brief tourney, where the winner will face off against Tickleping in a tickle fight to catch her. The winner turns out to be Teeheeping after a close match with Trustping.
            - heading "Ow Ow, No More Boo-Boos!" [level=4] [ref=e1191]:
              - link "Ow Ow, No More Boo-Boos!" [ref=e1193] [cursor=pointer]:
                - /url: /wiki/Ow_Ow,_No_More_Boo-Boos!
            - paragraph [ref=e1194]: Heartsping tries to cure Trustping of a cavity he developed after eating too many chocolate balls late at night. But when Owwping shows up at the bakery, she gets hit by her Tinkle Puff, she gets bandaged up by Trustping along with Teeheeping and Joahping while Trustping catches her with Romi.
            - heading "Shrinking Romi!" [level=4] [ref=e1195]:
              - link "Shrinking Romi!" [ref=e1197] [cursor=pointer]:
                - /url: /wiki/Shrinking_Romi!
            - paragraph [ref=e1198]: Heartsping meets Maskping for the first time, whom she decides to confront, leaving the Royal Jewel Teenieping students to try and catch the next Teenieping. When she eventually returns, she congratulates the three of them on their hard work, while also telling Romi about the masked Teenieping she met.
            - heading "Things Get Wooly!" [level=4] [ref=e1199]:
              - link "Things Get Wooly!" [ref=e1201] [cursor=pointer]:
                - /url: /wiki/Things_Get_Wooly!
            - paragraph [ref=e1202]: Maya makes Heartsping a knitted doll and gets the chance to knit with her at her flower shop. Without realizing it, the Royal Jewel Teeniepings worry that Cozyping turned her into a knitted doll, leading to a mad chase to try and get her back. But when Heartsping returns from getting some knitting supplies for Maya, she's greeted by the Teeniepings, who are more than happy to see her.
            - heading "Another Princess" [level=4] [ref=e1203]:
              - link "Another Princess" [ref=e1205] [cursor=pointer]:
                - /url: /wiki/Another_Princess
            - paragraph [ref=e1206]:
              - text: Heartsping meets Onlyping for the first time in a long time when Jenny comes to visit Romi on Earth, and they constantly fight, with Onlyping wanting to save Jenny in situations where she isn't in any danger. She also grows suspicious of the two of them, who seem to have learned how to use magic to make things move on their own, an incident that occurred in "
              - link "The Teddy Bear is Alive?!" [ref=e1207] [cursor=pointer]:
                - /url: /wiki/The_Teddy_Bear_is_Alive%3F!
              - text: "\""
            - paragraph [ref=e1208]: Things get worse when Onlyping tries to save Jenny from Lena, Hani and Cindy - who were picking on her - and Heartsping stops her from attacking them with magic. Heartsping expresses concern for Onlyping, while the latter believes she's acting sweet and innocent, masking her true intentions.
            - paragraph [ref=e1209]: When Onlyping attacks the Royal Jewel Teeniepings, this angers Heartsping, but Jenny tells Onlyping to stop, and they decide to leave and head back to the Emotions Kingdom.
            - heading "Heartrose Becomes a Kingdom" [level=4] [ref=e1210]:
              - link "Heartrose Becomes a Kingdom" [ref=e1212] [cursor=pointer]:
                - /url: /wiki/Heartrose_Becomes_a_Kingdom
            - paragraph [ref=e1213]: When Maskping makes Ladyping in the bakery become servants of her "kingdom," she discovers Maskping's true identity and motives when she attacks Ladyping and traps Romi and the Royal Jewel Teeniepings. Maskping's magic key starts to malfunction when it's knocked out of her hand, which surprises Heartsping. However, she decides not to tell Romi anything, possibly for fear that she will be upset. As the other Royal Teeniepings become frustrated with Maskping taking advantage of them, she becomes more careful than ever about the Jewel Teeniepings' safety.
            - heading "Who's the Real Heartsping?" [level=4] [ref=e1214]:
              - link "Who's the Real Heartsping?" [ref=e1216] [cursor=pointer]:
                - /url: /wiki/Who%27s_the_Real_Heartsping%3F
            - figure "The 2 Heartspings being cute" [ref=e1217]:
              - link "The 2 Heartspings being cute view image" [ref=e1218] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/f/f9/S2E18_-_Heartsping_and_her_clone_being_cute.png/revision/latest?cb=20250316070649
                - img "The 2 Heartspings being cute" [ref=e1219]
                - generic "view image" [ref=e1222]:
                  - img [ref=e1223]
              - paragraph [ref=e1226]: The 2 Heartspings being cute
            - paragraph [ref=e1227]:
              - text: Heartsping gets duplicated by
              - link "Buddyping" [ref=e1228] [cursor=pointer]:
                - /url: /wiki/Buddyping
              - text: "'s Tinkle Puff and is forced to deal with a clone of herself. Trouble begins to brew when the two get into a duel, and the clone winds up kicking her out of the bakery. She's rescued by Buddyping, who tries to convince her that the other Teeniepings will know she's the real Heartsping if she sets out to confront her clone. She does, and the Teeniepings figure out they're dealing with a clone, and Buddyping gets caught by Romi to break his spell."
            - heading "A Perilous Picnic" [level=4] [ref=e1229]:
              - link "A Perilous Picnic" [ref=e1231] [cursor=pointer]:
                - /url: /wiki/A_Perilous_Picnic
            - figure "Heartsping facing Maskping" [ref=e1232]:
              - link "Heartsping facing Maskping view image" [ref=e1233] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/2/2e/S2E21_-_Heartsping_facing_Maskping.png/revision/latest?cb=20230830134817
                - img "Heartsping facing Maskping" [ref=e1234]
                - generic "view image" [ref=e1237]:
                  - img [ref=e1238]
              - paragraph [ref=e1241]: Heartsping facing Maskping
            - paragraph [ref=e1242]: After Heartsping has a nightmare involving Maskping, she tries to call off going to a picnic with Jenny and Onlyping since she feels that something dangerous might happen. Despite warning them several times, Romi and the other Teeniepings choose to go along with her, and Heartsping rescinds in telling Romi the truth. At various points during the picnic, Heartsping tries to save the Teeniepings from various scenarios where they might get hurt, but only seem to be minor.
            - paragraph [ref=e1243]: A while later, during a game of hide-and-seek, Maskping uses her Enchanted Flute and makes all the Jewel Teeniepings fall into a deep sleep. Heartsping looks for them and sees them entering a cave (just like in her nightmare). She follows them and comes face to face with Maskping, and the two engage in a brief duel as she tries to free the other Teeniepings. To wake them, she activates the magic in her Royal Teenieping symbol to play a powerful version of the Lovely Tune, waking the Teeniepings from their slumber, while Maskping leaves, frustrated at her loss.
            - heading "Teenieping School Graduation" [level=4] [ref=e1244]:
              - link "Teenieping School Graduation" [ref=e1246] [cursor=pointer]:
                - /url: /wiki/Teenieping_School_Graduation
            - figure "Heartsping getting kidnapped by Maskping" [ref=e1247]:
              - link "Heartsping getting kidnapped by Maskping view image" [ref=e1248] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/d/d7/S2E24_-_Heartsping_getting_kidnapped_by_Maskping.png/revision/latest?cb=20230830134820
                - img "Heartsping getting kidnapped by Maskping" [ref=e1249]
                - generic "view image" [ref=e1252]:
                  - img [ref=e1253]
              - paragraph [ref=e1256]: Heartsping getting kidnapped by Maskping
            - paragraph [ref=e1257]:
              - text: After Romi and Heartsping host the Jewel Teeniepings' graduation and say goodbye to the Jewel Teeniepings, Maskping attacks again and kidnaps Heartsping, getting carried away to a
              - link "cavern" [ref=e1258] [cursor=pointer]:
                - /url: /wiki/Jewel_Cavern
              - text: in the Emotions Kingdom.
            - heading "Heartsping in Danger" [level=4] [ref=e1259]:
              - link "Heartsping in Danger" [ref=e1261] [cursor=pointer]:
                - /url: /wiki/Heartsping_in_Danger
            - paragraph [ref=e1262]: Once Heartsping arrives in the cavern, she and Maskping engage in a duel, as she tries to find out more about what Maskping is trying to do. Romi and Jenny arrive soon enough to stop Maskping and trap her, allowing Heartsping to reunite with Romi. But when they encounter the Jewel Dragon, and Jenny convinces Romi to try and stop it (believing that taming it could help restore the Jewel Forest), Jenny regains the magic spellbook that allowed her to control the Jewel Dragon and take advantage of it.
            - paragraph [ref=e1263]: When Jenny is about to be attacked by the dragon, Maskping arrives to try and defend her, destroying her cloak and revealing herself to be Onlyping. Heartsping breaks down and reveals to Romi the secret she had held about Maskping's identity and says she was too scared to tell her.
            - heading "The Jewel Forest is Restored" [level=4] [ref=e1264]:
              - link "The Jewel Forest is Restored" [ref=e1266] [cursor=pointer]:
                - /url: /wiki/The_Jewel_Forest_is_Restored
            - paragraph [ref=e1267]:
              - text: After Romi learns of Jenny's true motives, and Jenny ends their seemingly lifelong friendship, Jenny transforms and leaves, with Romi and Heartsping stuck with having to escape the cavern - and the rampaging Jewel Dragon. Eventually, the Royal Jewel Teeniepings make the save using the
              - link "Imperial Stone" [ref=e1268] [cursor=pointer]:
                - /url: /wiki/Imperial_Stone
              - text: ", which allows them to escape and control the dragon. They restore the condition of the Jewel Forest, and Heartsping attends the Royal Jewel Teeniepings' ceremony, where they earn their official Royal Teenieping symbols."
            - paragraph [ref=e1269]: After this, Romi and Heartsping return to Earth to live a normal life again, with Jenny's betrayal still in the back of their minds.
            - heading "Secret Catch! Teenieping" [level=3] [ref=e1270]:
              - link "Secret Catch! Teenieping" [ref=e1273] [cursor=pointer]:
                - /url: /wiki/Secret_Catch!_Teenieping
            - heading "Secret Catch! Key Teeniepings" [level=4] [ref=e1274]:
              - link "Secret Catch! Key Teeniepings" [ref=e1276] [cursor=pointer]:
                - /url: /wiki/Secret_Catch!_Key_Teeniepings
            - paragraph [ref=e1277]:
              - text: Having returned to their normal lives, a new story begins to brew as Heartsping and Romi encounter the
              - link "Royal Key Teeniepings" [ref=e1278] [cursor=pointer]:
                - /url: /wiki/Royal_Key_Teeniepings
              - text: . The three Teeniepings tell them that someone has gone and released the Key Teeniepings to Earth, and hint that it could be
              - link "someone Romi knows quite well" [ref=e1279] [cursor=pointer]:
                - /url: /wiki/Jenny
              - text: . They - along with a mysterious Teenieping in a box - join Romi to see what's going on.
            - heading "Transform! Floraheart" [level=4] [ref=e1280]:
              - link "Transform! Floraheart" [ref=e1282] [cursor=pointer]:
                - /url: /wiki/Transform!_Floraheart
            - figure "Heartsping transformed as Flora Heartsping" [ref=e1283]:
              - link "Heartsping transformed as Flora Heartsping view image" [ref=e1284] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/6/64/S3E02_-_Heartsping_smiling.jpg/revision/latest?cb=20250223052053
                - img "Heartsping transformed as Flora Heartsping" [ref=e1285]
                - generic "view image" [ref=e1288]:
                  - img [ref=e1289]
              - paragraph [ref=e1292]: Heartsping transformed as Flora Heartsping
            - paragraph [ref=e1293]:
              - text: Heartsping transforms with Romi for the first time into Princess Floraheart while trying to stop
              - link "Hurryping" [ref=e1294] [cursor=pointer]:
                - /url: /wiki/Hurryping
              - text: ", after receiving the"
              - link "Mystic Heart Wing" [ref=e1295] [cursor=pointer]:
                - /url: /wiki/Mystic_Heart_Wing
              - text: . She also gets an appearance change for the second time in the series. After they catch Hurryping, she settles in with the Royal Key Teeniepings in the new
              - link "Teenieping Secret Castle" [ref=e1296] [cursor=pointer]:
                - /url: /wiki/Teenieping_Secret_Castle
              - text: .
            - heading "Romi and Heartsping's Bodies are Switched" [level=4] [ref=e1297]:
              - link "Romi and Heartsping's Bodies are Switched" [ref=e1299] [cursor=pointer]:
                - /url: /wiki/Romi_and_Heartsping%27s_Bodies_are_Switched
            - figure "Heartsping as Romi being cute" [ref=e1300]:
              - link "Heartsping as Romi being cute view image" [ref=e1301] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/6/66/S3E09_-_Romi_cute_pose.png/revision/latest?cb=20250219084059
                - img "Heartsping as Romi being cute" [ref=e1302]
                - generic "view image" [ref=e1305]:
                  - img [ref=e1306]
              - paragraph [ref=e1309]: Heartsping as Romi being cute
            - paragraph [ref=e1310]:
              - text: A spill of
              - link "Wizping" [ref=e1311] [cursor=pointer]:
                - /url: /wiki/Wizping
              - text: "'s magic potion causes Romi and Heartsping to swap bodies. While the latter takes some solace in being a new human body, eventually they are able to stop Wizping by forcing her to use magic on them and swapping bodies again."
            - heading "Snow White Romi" [level=4] [ref=e1312]:
              - link "Snow White Romi" [ref=e1314] [cursor=pointer]:
                - /url: /wiki/Snow_White_Romi
            - paragraph [ref=e1315]:
              - text: When Romi and the Key Teeniepings get sucked into a Snow White and the Seven Dwarves picture book, she works with the Royal Key Teeniepings to try and save them. Using various supplies at the instruction of
              - link "Dr. Monziu" [ref=e1316] [cursor=pointer]:
                - /url: /wiki/Dr._Monziu
              - text: ", they're able to construct a potion that works to help maintain the contents of the book and bring them back to the real world."
            - heading "Teenieping Amusement Park for Everyone" [level=4] [ref=e1317]:
              - link "Teenieping Amusement Park for Everyone" [ref=e1319] [cursor=pointer]:
                - /url: /wiki/Teenieping_Amusement_Park_for_Everyone
            - figure "Heartsping having an idea" [ref=e1320]:
              - link "Heartsping having an idea view image" [ref=e1321] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/7/7d/S3E21_-_Heartsping_having_an_idea.png/revision/latest?cb=20250223052059
                - img "Heartsping having an idea" [ref=e1322]
                - generic "view image" [ref=e1325]:
                  - img [ref=e1326]
              - paragraph [ref=e1329]: Heartsping having an idea
            - paragraph [ref=e1330]:
              - text: Heartsping unveils the
              - link "Teenieping Amusement Park" [ref=e1331] [cursor=pointer]:
                - /url: /wiki/Teenieping_Amusement_Park
              - text: when a
              - link "Hye-joo" [ref=e1332] [cursor=pointer]:
                - /url: /wiki/Hye-joo
              - text: concert gets rained out and everyone is forced to stay indoors. But when Onlyping sneaks in to ruin the festivities and trap everyone,
              - link "Luckyping" [ref=e1333] [cursor=pointer]:
                - /url: /wiki/Luckyping
              - text: saves them with her magic.
            - heading "Teenieping Fashion Show" [level=4] [ref=e1334]:
              - link "Teenieping Fashion Show" [ref=e1336] [cursor=pointer]:
                - /url: /wiki/Teenieping_Fashion_Show
            - figure "Heartsping and the others on stage" [ref=e1337]:
              - link "Heartsping and the others on stage view image" [ref=e1338] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/e/e5/S3E24_-_Royal_Teeniepings_fashion_show_outfits_4.png/revision/latest?cb=20250303105631
                - img "Heartsping and the others on stage" [ref=e1339]
                - generic "view image" [ref=e1342]:
                  - img [ref=e1343]
              - paragraph [ref=e1346]: Heartsping and the others on stage
            - paragraph [ref=e1347]: She and the other Royal Teeniepings were chosen to be performing on stage at the fashion show. Everything was down at their first try, but as they keep practicing everything is now okay. She and the others started to perform as they were on stage. Heartsping, who used a golden dress, green gardener's dress, and a pink dress. But as they leave, Jenny comes by and traps all the Key Teeniepings - excluding Heartsping, Nanaping, Trueping, Okeydokeyping, and Luckyping - Heartsping hides under Luckyping's shield to be safe, but Jenny transforms to Princess Labyrinth and caught Luckyping. She, Romi, and the other key royals followed her at Mystic Town.
            - heading "Mystic Town on a Thread" [level=4] [ref=e1348]:
              - link "Mystic Town on a Thread" [ref=e1350] [cursor=pointer]:
                - /url: /wiki/Mystic_Town_on_a_Thread
            - paragraph [ref=e1351]: After Jenny transforms with Onlyping to become Princess Labyrinth and traps all the Key Teeniepings, Hearstping joins Romi in trying to navigate a maze, while the Royal Key Teeniepings - who previously joined her - find their way and help the two of them through the maze.
            - heading "Goodbye, Key Teeniepings" [level=4] [ref=e1352]:
              - link "Goodbye, Key Teeniepings" [ref=e1354] [cursor=pointer]:
                - /url: /wiki/Goodbye,_Key_Teeniepings
            - paragraph [ref=e1355]: Heartsping faces off against Onlyping one last time, alongside Princess Twilight and Luckyping as they battle Jenny. After Romi manages to rescue Jenny and offers her a final opportunity to reunite with her parents, the Mystic Town is ultimately saved. Heartsping forms a bond with Onlyping, putting their past conflicts behind them. Together, they journey back to Harmony Town with Romi, seeking to restore the tranquil days they once knew.
            - heading "Dessert Catch! Teenieping" [level=3] [ref=e1356]:
              - link "Dessert Catch! Teenieping" [ref=e1359] [cursor=pointer]:
                - /url: /wiki/Dessert_Catch!_Teenieping
            - heading "Sweet Dessert Teeniepings" [level=4] [ref=e1360]:
              - link "Sweet Dessert Teeniepings" [ref=e1362] [cursor=pointer]:
                - /url: /wiki/Sweet_Dessert_Teeniepings
            - figure "Heartsping's cupcake" [ref=e1363]:
              - link "Heartsping's cupcake view image" [ref=e1364] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/3/3a/S4E01_-_Heartsping%27s_cupcake.png/revision/latest?cb=20250223051758
                - img "Heartsping's cupcake" [ref=e1365]
                - generic "view image" [ref=e1368]:
                  - img [ref=e1369]
              - paragraph [ref=e1372]: Heartsping's cupcake
            - paragraph [ref=e1373]: She and Romi were busy baking cupcakes when she proudly declared that her cupcake was made with love. Romi couldn't help but giggle at how messy it looked, and Heartsping felt a twinge of annoyance. Marylou tried to smooth things over with a little white lie, but Heartsping saw right through it. The bakery staff quickly made excuses and fled, leaving Heartsping feeling suspicious of Romi. The conversation then turned to the Dessert Town, leading them on a quest to find a mysterious Dessert Teenieping. Romi was skeptical, believing it to be a figment of Dr. Monziu's imagination, but their journey took an unexpected turn when they met Shashaping and Jellyping.
            - heading "Transform! Princess BerryHeart" [level=4] [ref=e1374]:
              - link "Transform! Princess BerryHeart" [ref=e1376] [cursor=pointer]:
                - /url: /wiki/Transform!_Princess_BerryHeart
            - figure "Heartsping's transformation" [ref=e1377]:
              - link "Heartsping's transformation view image" [ref=e1378] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/0/08/S4E02_-_Heartsping_as_Berry_Heartsping.png/revision/latest?cb=20250223052335
                - img "Heartsping's transformation" [ref=e1379]
                - generic "view image" [ref=e1382]:
                  - img [ref=e1383]
              - paragraph [ref=e1386]: Heartsping's transformation
            - paragraph [ref=e1387]:
              - text: After a mad chase with
              - link "Lena" [ref=e1388] [cursor=pointer]:
                - /url: /wiki/Lena
              - text: ", she regains the power from the"
              - link "Sugar Berry Compact" [ref=e1389] [cursor=pointer]:
                - /url: /wiki/Sugar_Berry_Compact
              - text: and transforms into Berry Heartsping, which leads to Romi transforming into Princess Berryheart to save
              - link "Fluffyping" [ref=e1390] [cursor=pointer]:
                - /url: /wiki/Fluffyping
              - text: and catch
              - link "Candyping" [ref=e1391] [cursor=pointer]:
                - /url: /wiki/Candyping
              - text: .
            - heading "I Want To Be a Royal Teenieping" [level=4] [ref=e1392]:
              - link "I Want To Be a Royal Teenieping" [ref=e1394] [cursor=pointer]:
                - /url: /wiki/I_Want_To_Be_a_Royal_Teenieping
            - paragraph [ref=e1395]: TBA
            - heading "Shashaping Will Cure You" [level=4] [ref=e1396]:
              - link "Shashaping Will Cure You" [ref=e1398] [cursor=pointer]:
                - /url: /wiki/Shashaping_Will_Cure_You
            - figure "Heartsping being sick" [ref=e1399]:
              - link "Heartsping being sick view image" [ref=e1400] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/0/0e/S4E16_-_Heartsping_sick_4.png/revision/latest?cb=20250223052342
                - img "Heartsping being sick" [ref=e1401]
                - generic "view image" [ref=e1404]:
                  - img [ref=e1405]
              - paragraph [ref=e1408]: Heartsping being sick
            - paragraph [ref=e1409]:
              - text: "Heartsping is excited to taste Shashaping's sherbets with Shashaping's special ingredient: star fragments. However, unexpectedly, although Heartsping enjoys it, she passes out due to the star fragments' poisonous effects since she's not a Dessert Teenieping, making her weaker and suffer. Later on, she is cured by Shashaping when she's been fed by the"
              - link "Frozie Strawberry" [ref=e1410] [cursor=pointer]:
                - /url: /wiki/Frozie_Strawberry
              - text: .
            - heading "Star Catch! Teenieping" [level=3] [ref=e1411]:
              - link "Star Catch! Teenieping" [ref=e1414] [cursor=pointer]:
                - /url: /wiki/Star_Catch!_Teenieping
            - heading "The Girl Who Came Upon a Star" [level=4] [ref=e1415]:
              - link "The Girl Who Came Upon a Star" [ref=e1417] [cursor=pointer]:
                - /url: /wiki/The_Girl_Who_Came_Upon_a_Star
            - paragraph [ref=e1418]:
              - text: Heartsping, with Romi, along with Jenny and Dr. Monziu (and the
              - link "Royal Emotion Teeniepings" [ref=e1419] [cursor=pointer]:
                - /url: /wiki/Royal_Emotion_Teeniepings
              - text: ) are at the station after a week had passed since she's stayed in the
              - link "Emotions Kingdom" [ref=e1420] [cursor=pointer]:
                - /url: /wiki/Emotions_Kingdom
              - text: as a vacation. The Royal Emotion Teeniepings assure that they've been taking care of and protecting the kingdom, and suggest that Romi should go to the Space Star Village since a festival is being hosted there.
            - paragraph [ref=e1421]:
              - text: The
              - link "Space Star Plane" [ref=e1422] [cursor=pointer]:
                - /url: /wiki/Space_Star_Plane
              - text: arrives and then Romi and Heartsping board on the plane. As the plane tells them that's safe to unbuckle their seatbelts, Romi gleefully looks out of the window, but Heartsping tells her that she can't stay in the village for too long since she has a lot of homework to do.
            - paragraph [ref=e1423]:
              - text: Although Romi says about her not needing to do her homework right away since Sarah is away from her trip, Heartsping reminds her of the time when her parents were worried about her after they had received her low test result. As they were looking the shooting stars and comets, the plane suddenly gets stuck by some rocks, so
              - link "Hopping" [ref=e1424] [cursor=pointer]:
                - /url: /wiki/Hopping
              - text: tell them to fasten their seat belts as they are approaching the Space Star Village that's being sucked by a black hole.
            - paragraph [ref=e1425]: When the plane crashes Romi and Heartsping step out of the vehicle only to find that there's no festival or any Star Teeniepings, but they rush over to help Hopping up after the crash. With the Shooting Star Pact, Heartsping transforms Romi into Princess Brightheart.
            - heading "Princess Catch! Teenieping" [level=3] [ref=e1426]:
              - link "Princess Catch! Teenieping" [ref=e1429] [cursor=pointer]:
                - /url: /wiki/Princess_Catch!_Teenieping
            - paragraph [ref=e1430]: TBA
            - heading "Trivia" [level=2] [ref=e1431]
            - list [ref=e1432]:
              - listitem [ref=e1433]:
                - text: Heartsping's catchphrase, "Chu"/"츄", is the shortening of "하츄"/"Hachyu"; the English translators kept the catchphrase.
                - list [ref=e1434]:
                  - listitem [ref=e1435]: "\"chu\" is the Japanese onomatopoeia for the kissing sound."
              - listitem [ref=e1436]: In her Season 1 transition picture, the Royal Teenieping sign on her belly is missing.
              - listitem [ref=e1437]:
                - text: In "
                - link "Spooky Picture Time" [ref=e1438] [cursor=pointer]:
                  - /url: /wiki/Spooky_Picture_Time
                - text: "\", Heartsping's fear of"
                - link "Spookping" [ref=e1439] [cursor=pointer]:
                  - /url: /wiki/Spookping
                - text: "'s fake spider could imply that she has"
                - link "arachnophobia" [ref=e1440] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Arachnophobia
                - text: .
              - listitem [ref=e1441]:
                - text: Heartsping is one of the few Teeniepings to have
                - link "a song about her" [ref=e1442] [cursor=pointer]:
                  - /url: /wiki/Heartsping_Song
                - text: .
                - list [ref=e1443]:
                  - listitem [ref=e1444]:
                    - text: She, alongside
                    - link "Balletping" [ref=e1445] [cursor=pointer]:
                      - /url: /wiki/Balletping
                    - text: ","
                    - link "Splashping" [ref=e1446] [cursor=pointer]:
                      - /url: /wiki/Splashping
                    - text: ","
                    - link "Fluffyping" [ref=e1447] [cursor=pointer]:
                      - /url: /wiki/Fluffyping
                    - text: ","
                    - link "Shashaping" [ref=e1448] [cursor=pointer]:
                      - /url: /wiki/Shashaping
                    - text: ","
                    - link "Jellyping" [ref=e1449] [cursor=pointer]:
                      - /url: /wiki/Jellyping
                    - text: ","
                    - link "Cupping" [ref=e1450] [cursor=pointer]:
                      - /url: /wiki/Cupping
                    - text: ","
                    - link "Muffping" [ref=e1451] [cursor=pointer]:
                      - /url: /wiki/Muffping
                    - text: ","
                    - link "Sweetping" [ref=e1452] [cursor=pointer]:
                      - /url: /wiki/Sweetping
                    - text: ","
                    - link "Tangyping" [ref=e1453] [cursor=pointer]:
                      - /url: /wiki/Tangyping
                    - text: ","
                    - link "Doremiping" [ref=e1454] [cursor=pointer]:
                      - /url: /wiki/Doremiping
                    - text: ", and"
                    - link "Swayping" [ref=e1455] [cursor=pointer]:
                      - /url: /wiki/Swayping
                    - text: are the only Teeniepings to have their own song.
              - listitem [ref=e1456]:
                - text: Heartsping is the only Teenieping to appear throughout the series from since the beginning.
                - list [ref=e1457]:
                  - listitem [ref=e1458]: Heartsping is also the only Teenieping to appear in every episode of the series so far.
              - listitem [ref=e1459]:
                - text: "Her pigtails have a few uses; some instances are as follows:"
                - list [ref=e1460]:
                  - listitem [ref=e1461]:
                    - text: In "
                    - link "A Very Charming Teenieping!" [ref=e1462] [cursor=pointer]:
                      - /url: /wiki/A_Very_Charming_Teenieping!
                    - text: "\", she hits"
                    - link "Kikiping" [ref=e1463] [cursor=pointer]:
                      - /url: /wiki/Kikiping
                    - text: with her pigtails as to stop him from doing any more antics.
                    - list [ref=e1464]:
                      - listitem [ref=e1465]:
                        - text: In the same episode, she covers her face with her pigtails in embarrassment as she watches
                        - link "Dylan" [ref=e1466] [cursor=pointer]:
                          - /url: /wiki/Dylan
                        - text: acting all "cute".
                  - listitem [ref=e1467]:
                    - text: In "
                    - link "Ariaping the Singer" [ref=e1468] [cursor=pointer]:
                      - /url: /wiki/Ariaping_the_Singer
                    - text: "\", she covers her face with her pigtails with fear as she was slipping off the crow, trying to get the last note."
                  - listitem [ref=e1469]:
                    - text: In
                    - link "Star Catch! Teenieping" [ref=e1471] [cursor=pointer]:
                      - /url: /wiki/Star_Catch!_Teenieping
                    - text: ", it is shown that she can use her pigtails to cover up her front body to protect her from the cold."
              - listitem [ref=e1472]:
                - text: Although Heartsping's appearance changes in every season, she is still called by her original name.
                - list [ref=e1473]:
                  - listitem [ref=e1474]: This is only applied to the TV series, as she gets called by her season-based names in merchandise and other media.
              - listitem [ref=e1475]:
                - text: According to the
                - link "Magic Catcher toy" [ref=e1476] [cursor=pointer]:
                  - /url: /wiki/Magic_Catcher/Merchandise
                - text: ", Heartsping's QR variable name is \"Fairy 01\"."
              - listitem [ref=e1477]: In the Teenieping calendars, it reveals that Heartsping's birthday is on March 6.
