            - heading "Appearance" [level=2] [ref=e777]
            - paragraph [ref=e778]: Heartsping is a pink heart-themed Teenieping. While her appearance can be easily recognized, it differs each season.
            - heading "Season 1" [level=3] [ref=e779]
            - figure "Heartsping's S1 Appearance" [ref=e780]:
              - link "Heartsping's S1 Appearance view image" [ref=e781] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/7/79/Heartsping_S1_Render_16.png/revision/latest?cb=20260322130439
                - img "Heartsping's S1 Appearance" [ref=e782]
                - generic "view image" [ref=e785]:
                  - img [ref=e786]
              - paragraph [ref=e789]: Heartsping's S1 Appearance
            - paragraph [ref=e790]:
              - text: In
              - link "Catch! Teenieping" [ref=e792] [cursor=pointer]:
                - /url: /wiki/Catch!_Teenieping_(season)
              - text: ", Heartsping has pale pink fur, pink eyes, and a pigtail style with curled and pink at the end, with a pink fringe and tints at the bottom."
            - paragraph [ref=e793]: She also has a pink collar with a round gold badge, her golden Royal Teenieping sign on her chest, and a long heart tail with gold on it.
            - paragraph [ref=e794]: Her prop is a gold and pink handheld mirror with a pink ribbon shaped like a heart.
            - heading "Season 2" [level=3] [ref=e795]
            - figure "Heartping's S2 Appearance" [ref=e796]:
              - link "Heartping's S2 Appearance view image" [ref=e797] [cursor=pointer]:
