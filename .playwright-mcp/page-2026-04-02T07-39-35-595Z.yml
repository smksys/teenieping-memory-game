              - text: In
              - link "Star Catch! Teenieping" [ref=e852] [cursor=pointer]:
                - /url: /wiki/Star_Catch!_Teenieping
              - text: ", she now wears pink jewel stars with pastel rainbow shots. Her outfit is similar to her Season 4 design of clothes, but the skirt has a golden hem and her torso has light pink line patterns on both sides."
            - paragraph [ref=e853]: Also, she has a pink bow with a pink star outlined in gold in the middle.
            - paragraph [ref=e854]: Her prop is a pink glowpuff star pillow.
            - heading "Season 6" [level=3] [ref=e855]
            - figure "Heartsping's S6 Appearance" [ref=e856]:
