              - text: In
              - link "Dessert Catch! Teenieping" [ref=e837] [cursor=pointer]:
                - /url: /wiki/Dessert_Catch!_Teenieping
              - text: ", she now wears strawberry heart cookie flower-shaped clips, a white dress, a pink collar adorned with a yellow bow, and a pink skirt."
            - paragraph [ref=e838]: Her prop is a pink bell with a hint of white, and a yellow stick, including a pink bow.
            - heading "Season 5" [level=3] [ref=e839]
            - figure "Heartsping's S5 Appearance" [ref=e840]:
