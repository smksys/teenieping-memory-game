              - paragraph [ref=e865]: Heartsping's S6 Appearance
            - paragraph [ref=e866]:
              - text: In
              - link "Princess Catch! Teenieping" [ref=e868] [cursor=pointer]:
                - /url: /wiki/Princess_Catch!_Teenieping
              - text: ", she now wears two glittery heart clips similar to her heart clips in Season 1; the tints of her pigtails also have glitter. She wears a white dress with thin golden lines around her Royal Mark, a pink skirt, which also has a golden line at the end, a golden belt, a transparent pink collar with a heart on the center, and a silver tiara with a pink heart in the middle."
            - paragraph [ref=e869]: She also wears white shoes now instead of white tights.
            - paragraph [ref=e870]: Her prop is a magical wand.
            - heading "Prequel/Movie" [level=3] [ref=e871]: Prequel/Movie
            - figure "Heartsping's Former Appearance" [ref=e872]:
              - link "Heartsping's Former Appearance view image" [ref=e873] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/d/dc/Heartsping_M1_Render_2.png/revision/latest?cb=20240820155906
                - img "Heartsping's Former Appearance" [ref=e874]
                - generic "view image" [ref=e877]:
                  - img [ref=e878]
              - paragraph [ref=e881]: Heartsping's Former Appearance
            - paragraph [ref=e882]:
              - text: Her prequel design is like her Season 1 design, but without her Royal Mark (since she was not a
              - link "Royal Teenieping" [ref=e883] [cursor=pointer]:
                - /url: /wiki/Royal_Teeniepings
              - text: beforehand). Instead of the mirror, she has a rabbit plush, but it has no special effects.
            - heading "Personality" [level=2] [ref=e884]
            - figure "Heartsping acting cute when having a strawberry tart" [ref=e885]:
              - link "Heartsping acting cute when having a strawberry tart view image" [ref=e886] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/e/e2/S1E17_-_Heartsping_very_cute_pose_eyes.png/revision/latest?cb=20230830134808
                - img "Heartsping acting cute when having a strawberry tart" [ref=e887]
                - generic "view image" [ref=e890]:
                  - img [ref=e891]
              - paragraph [ref=e894]: Heartsping acting cute when having a strawberry tart
            - paragraph [ref=e895]: Heartsping is nice and kindhearted. She has a girly and feminine attitude, likes to act cute, and occupies herself with various activities, like having tea with friends or striking cute poses.
            - paragraph [ref=e896]: "She also loves her friends: she likes to make them happy, even though it sometimes makes her hide things or follow them even though she doesn't want to."
            - paragraph [ref=e897]:
              - text: She can be immature like her Royal Teenieping colleagues, as she likes to follow her instincts without thinking of the consequences, but she can also be more mature when the situation demands it. In Twinkle Catch! Teenieping, she acts strictly towards the
              - link "Royal Teenieping students" [ref=e898] [cursor=pointer]:
                - /url: /wiki/Royal_Jewel_Teeniepings
              - text: and is dedicated to teaching them about various subjects and imposing order when needed.
            - paragraph [ref=e899]: Heartsping is also smart, given her upbringing as a Royal Teenieping, possessing excellent skills in physics and nursing. She also has extensive knowledge of nearly every Teenieping in the Emotions Kingdom, as she can describe who they are and their abilities.
            - paragraph [ref=e900]:
              - text: Before she met Romi, she was introverted and listened to a
              - link "mysterious Teenieping" [ref=e901] [cursor=pointer]:
                - /url: /wiki/Truthping
              - text: ", who stated that Teeniepings and humans cannot be friends. She was shy and nervous, reluctantly ignoring"
              - link "Romi" [ref=e902] [cursor=pointer]:
                - /url: /wiki/Romi
              - text: and
              - link "Marie" [ref=e903] [cursor=pointer]:
                - /url: /wiki/Marie
              - text: "'s request, but she later opens up and is willing to stand up for herself when times are tough."
            - heading "Etymology" [level=2] [ref=e904]
            - list [ref=e905]:
              - listitem [ref=e906]: The Korean name 하츄핑 ("Hachyuping") is a combination of the words 하트 ("Hateu"), which is the Korean transliteration of the English word heart, and 츄 ("Chu"), which is the sound of kissing.
              - listitem [ref=e907]: The English name ("Heartsping") is meant to represent the theme that she's based on, hearts.
              - listitem [ref=e908]: The Chinese name 爱心萌可 ("Àixīn méng kě") comes from the word 爱心 ("Àixīn") meaning love, which is Heartsping's concept. It is also similar to the word 爱心形状 ("Àixīn xíngzhuàng"), which means "heart shape". This aligns with Heartsping's theme of hearts.
            - heading "Magic" [level=2] [ref=e909]
            - heading "Transformation" [level=3] [ref=e910]
