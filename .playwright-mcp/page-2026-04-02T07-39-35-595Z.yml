              - text: In
              - link "Twinkle Catch! Teenieping" [ref=e808] [cursor=pointer]:
                - /url: /wiki/Twinkle_Catch!_Teenieping
              - text: ", she wields the pink diamond, and her prop becomes a pink mini heart-shaped harp with a heart jewel on top of it, and her hearts are made from pink diamond and her collar is shaped as a ribbon."
            - heading "Season 3" [level=3] [ref=e809]
            - figure "Heartsping's S3 Appearance" [ref=e810]:
              - link "Heartsping's S3 Appearance view image" [ref=e811] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/d/da/Heartsping_S3_Render_2.png/revision/latest?cb=20260123135850
