            - heading "Appearance Sign in to edit" [level=2] [ref=e486]:
              - text: Appearance
              - link "Sign in to edit" [ref=e488] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D1&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e489]
            - figure "Luckyping's Appearance" [ref=e491]:
              - link "Luckyping's Appearance view image" [ref=e492] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/4/42/Luckyping_Render_3_with_Staff.png/revision/latest?cb=20260201024907
                - img "Luckyping's Appearance" [ref=e493]
                - generic "view image" [ref=e496]:
                  - img [ref=e497]
              - paragraph [ref=e500]: Luckyping's Appearance
            - paragraph [ref=e501]: Luckyping is a purple luck-themed Teenieping.
            - paragraph [ref=e502]: She has a lavender body, purple eyes, and glittery light and dark purple hair with a light fringe going to the left. She wears a white clover hairpin, a white and silver tiara, yellow clover-shaped earrings, and a metallic purple headpiece. The hairpin, the tiara, and the headpiece also have an identical pink jewel.
            - paragraph [ref=e503]: She wears a poofy pink and violet princess-like dress with a white center where her Legend Teenieping symbol is. She also wears a white laced cape which is also connected to her dress. A pink bow with a yellow clover-shaped brooch is attached to it.
            - paragraph [ref=e504]: Her prop is a purple, magenta, and yellow staff with a heart-like shape, a pink clover-shaped jewel, and white wings on top. Her key is purple with a yellow clover on top.
            - heading "Box Sign in to edit" [level=3] [ref=e505]:
              - link "Box" [ref=e507] [cursor=pointer]:
                - /url: /wiki/Mystic_Chest
              - link "Sign in to edit" [ref=e509] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D2&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e510]
            - figure "Luckyping's box" [ref=e512]:
              - link "Luckyping's box view image" [ref=e513] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/b/b0/Luckyping%27s_Box_Render_2.png/revision/latest?cb=20260214230912
                - img "Luckyping's box" [ref=e514]
                - generic "view image" [ref=e517]:
                  - img [ref=e518]
              - paragraph [ref=e521]: Luckyping's box
            - paragraph [ref=e522]: When she is in her box, the box appears as purple and rectangular with a yellow keyhole in the middle, and with clovers on it.
            - heading "Personality Sign in to edit" [level=2] [ref=e523]:
              - text: Personality
              - link "Sign in to edit" [ref=e525] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D3&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e526]
            - paragraph [ref=e528]:
              - text: Luckyping can be arrogant or bossy sometimes, but is still a sweet and wise Teenieping. She is charming, and is always happy to give out advice, as she enjoys wearing stylish clothes, or practicing magic. Luckyping is also quite supportive to people like the time she helped
              - link "Okeydokeyping" [ref=e529] [cursor=pointer]:
                - /url: /wiki/Okeydokeyping
              - text: .
            - paragraph [ref=e530]:
              - text: Luckyping wants to make sure that the
              - link "Key Teeniepings" [ref=e531] [cursor=pointer]:
                - /url: /wiki/Key_Teeniepings
              - text: are safe from harm, and often worries that her magic will not be enough to ensure their safety. She is intelligent and hard to fool, as well as stubborn at times.
            - heading "Etymology Sign in to edit" [level=2] [ref=e532]:
              - text: Etymology
              - link "Sign in to edit" [ref=e534] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D4&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e535]
            - list [ref=e537]:
              - listitem [ref=e538]: The Korean name "행운핑" (Haengunping) comes from "행운" (Haengun), which means "luck" or "fortune".
              - listitem [ref=e539]: The Chinese name "幸运萌可" (Xìngyùn méng kě) comes from "幸运" (Xìngyùn), which means "lucky" or "good luck".
              - listitem [ref=e540]: The Japanese name "ラッキーピン" (Rakkīpin) comes from the English word "lucky".
            - heading "Magic Sign in to edit" [level=2] [ref=e541]:
              - text: Magic
              - link "Sign in to edit" [ref=e543] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D5&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e544]
            - paragraph [ref=e546]: "Because of her role as a Legend Teenieping; Luckyping has a vast amount of powerful magic: in addition to already impressive abilities such as being able to fly, she has powers related to multiple instances."
            - heading "Transformation Sign in to edit" [level=3] [ref=e547]:
              - text: Transformation
              - link "Sign in to edit" [ref=e549] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D6&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e550]
            - figure "Romi transformed as Princess Twilight" [ref=e552]:
              - link "Romi transformed as Princess Twilight view image" [ref=e553] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/7/78/S3E26_-_Princess_Twilight_pose.jpg/revision/latest?cb=20240908005856
                - img "Romi transformed as Princess Twilight" [ref=e554]
                - generic "view image" [ref=e557]:
                  - img [ref=e558]
              - paragraph [ref=e561]: Romi transformed as Princess Twilight
            - paragraph [ref=e562]:
              - text: By giving
              - link "Romi" [ref=e563] [cursor=pointer]:
                - /url: /wiki/Romi
              - text: a kiss, Luckyping can help her transform into
              - link "Princess Twilight" [ref=e565] [cursor=pointer]:
                - /url: /wiki/Princesses
              - text: ". As always, when transformed, Romi gains physical strength, and can use the power of her staff to carry out her objective. But at the same time, she also has some more powers as Princess Twilight is a more powerful transformation: she is most notably able to fly, and she more globally has stronger magic, as she can, for example, shut down the Forbidden Gate with the help of Luckyping."
            - heading "Luck Manipulation Sign in to edit" [level=3] [ref=e566]:
              - text: Luck Manipulation
              - link "Sign in to edit" [ref=e568] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D7&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e569]
            - figure "Luckyping's Breath of Luck" [ref=e571]:
              - link "Luckyping's Breath of Luck view image" [ref=e572] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/d/da/S3E17_-_Luckyping_creating_a_Luck_Breath.png/revision/latest?cb=20250304215408
                - img "Luckyping's Breath of Luck" [ref=e573]
                - generic "view image" [ref=e576]:
                  - img [ref=e577]
              - paragraph [ref=e580]: Luckyping's Breath of Luck
            - paragraph [ref=e581]:
              - text: As her name suggests, Luckyping's main power revolves around luck; she can manipulate it in various ways, first of all with the Breath of Luck. When she directs it towards an object, whether it is magic or not, she can alter it to make it lucky or unlucky so that it can trigger either positive or negative events. This alteration is in the object itself, meaning (for example) that its composition or behavior can change (like the photos of Maya's camera in "
              - link "Dad's Camera" [ref=e582] [cursor=pointer]:
                - /url: /wiki/Dad%27s_Camera
              - text: "\"), thus creating the desired luck or bad luck."
            - figure "Luckyping absorbing the lucky stars" [ref=e583]:
              - link "Luckyping absorbing the lucky stars view image" [ref=e584] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/8/88/S3E13_-_Luckyping_absorbing_the_lucky_stars.png/revision/latest?cb=20250304215415
                - img "Luckyping absorbing the lucky stars" [ref=e585]
                - generic "view image" [ref=e588]:
                  - img [ref=e589]
              - paragraph [ref=e592]: Luckyping absorbing the lucky stars
            - paragraph [ref=e593]:
              - text: "While she can give luck, she can also take it: Luckyping is able to create a strong purplish-pink beam to absorb any materials and magical representations of luck (like the stars of the magical lucky cookies in \""
              - link "Lucky Cookie Full of Fortune" [ref=e594] [cursor=pointer]:
                - /url: /wiki/Lucky_Cookie_Full_of_Fortune
              - text: "\"). This ability is very demanding in terms of energy as it is powerful."
            - heading "Attack and Defense Sign in to edit" [level=3] [ref=e595]:
              - text: Attack and Defense
              - link "Sign in to edit" [ref=e597] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D8&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e598]
            - figure "Luckyping creating her defensive halo" [ref=e600]:
              - link "Luckyping creating her defensive halo view image" [ref=e601] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/c/c5/S3E21_-_Luckyping_creating_her_defensive_halo.png/revision/latest?cb=20240906223716
                - img "Luckyping creating her defensive halo" [ref=e602]
                - generic "view image" [ref=e605]:
                  - img [ref=e606]
              - paragraph [ref=e609]: Luckyping creating her defensive halo
            - paragraph [ref=e610]:
              - text: Just like any Legend Teenieping, Luckyping has a wide range of powerful attacks. One of her most powerful ones can undo even the most strongest powers, like
              - link "Onlyping" [ref=e611] [cursor=pointer]:
                - /url: /wiki/Onlyping
              - text: "'s in \""
              - link "Teenieping Amusement Park for Everyone" [ref=e612] [cursor=pointer]:
                - /url: /wiki/Teenieping_Amusement_Park_for_Everyone
              - text: "\": this attack takes the form of a purplish-pink and yellow sonic attack directed towards the magic Luckyping wants to undo. Finally, she can sprinkle some Twinkle Puff towards someone to harm them, but the specificities of this ability are unknown as it was never really seen working."
            - figure "Luckyping creates her clover shield" [ref=e613]:
              - link "Luckyping creates her clover shield view image" [ref=e614] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/d/dc/S3E24_-_Luckyping%27s_Clover_Shield.png/revision/latest?cb=20240530165249
                - img "Luckyping creates her clover shield" [ref=e615]
                - generic "view image" [ref=e618]:
                  - img [ref=e619]
              - paragraph [ref=e622]: Luckyping creates her clover shield
            - paragraph [ref=e623]: Additionally, Luckyping has more classic defensive abilities, as she can create a green protective clover-shaped shield when needed.
            - heading "Powers of the Mystic Town Sign in to edit" [level=3] [ref=e624]:
              - text: Powers of the Mystic Town
              - link "Sign in to edit" [ref=e626] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D9&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e627]
            - figure "The portal key in its final form" [ref=e629]:
              - link "The portal key in its final form view image" [ref=e630] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/9/98/S3E24_-_Luckyping%27s_portal_key.png/revision/latest?cb=20240906223958
                - img "The portal key in its final form" [ref=e631]
                - generic "view image" [ref=e634]:
                  - img [ref=e635]
              - paragraph [ref=e638]: The portal key in its final form
            - paragraph [ref=e639]:
              - text: Because of her role being guardian of the Mystic Town, she has some powers which ties in with the magic of the town. One of her most powerful abilities is to open a portal from Earth to the town with the help of multiple objects. She first uses her staff to create a magical wave, and when the
              - link "Master Key" [ref=e640] [cursor=pointer]:
                - /url: /wiki/Master_Key
              - text: is set correctly (in her box), it attaches all of the
              - link "Key Teeniepings" [ref=e641] [cursor=pointer]:
                - /url: /wiki/Key_Teeniepings
              - text: "' personal keys to then create one big key, able to open a keyhole-shaped portal when inserted into a wall. However, the process of the big key's formation is long, as it usually takes a few hours."
            - figure "Luckyping's Tinkle Puff shower" [ref=e642]:
              - link "Luckyping's shower view image" [ref=e643] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/8/88/S3E24_-_Luckyping%27s_Tinkle_Puff_halo.png/revision/latest?cb=20240906224051
                - img "Luckyping's shower" [ref=e644]
                - generic "view image" [ref=e647]:
                  - img [ref=e648]
              - paragraph [ref=e651]:
                - text: Luckyping's
                - link "Tinkle Puff" [ref=e652] [cursor=pointer]:
                  - /url: /wiki/Tinkle_Puff
                - text: shower
            - paragraph [ref=e653]:
              - text: Along with that come some other minor powers, such as the ability to recreate an identical
              - link "Mystic Heart Wing" [ref=e654] [cursor=pointer]:
                - /url: /wiki/Mystic_Heart_Wing
              - text: with her box, or to, along with Princess Twilight's magic, close the Forbidden Gate. She can also create a
              - link "Tinkle Puff" [ref=e655] [cursor=pointer]:
                - /url: /wiki/Tinkle_Puff
              - text: shower, which doesn't really have any functions except being pleasing to look at.
            - heading "History Sign in to edit" [level=2] [ref=e656]:
              - text: History
              - link "Sign in to edit" [ref=e658] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D10&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e659]
            - heading "Role in Mystic Town Sign in to edit" [level=3] [ref=e661]:
              - text: Role in Mystic Town
              - link "Sign in to edit" [ref=e663] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D11&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e664]
            - figure "Luckyping watching over the Mystic Town" [ref=e666]:
              - link "Luckyping watching over the Mystic Town view image" [ref=e667] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/8/87/S3E21_-_Luckyping_Looks_Over_the_Mystic_Town.png/revision/latest?cb=20250314062119
                - img "Luckyping watching over the Mystic Town" [ref=e668]
                - generic "view image" [ref=e671]:
                  - img [ref=e672]
              - paragraph [ref=e675]: Luckyping watching over the Mystic Town
            - paragraph [ref=e676]:
              - text: Before the events of Season 3, Luckyping was the sole owner of the
              - link "Master Key" [ref=e677] [cursor=pointer]:
                - /url: /wiki/Master_Key
              - text: and the
              - link "Mystic Town" [ref=e678] [cursor=pointer]:
                - /url: /wiki/Mystic_Town
              - text: "'s treasure to which she has to protect and manage. At some point in her life, she becomes a"
              - link "Legend Teenieping" [ref=e679] [cursor=pointer]:
                - /url: /wiki/Legend_Teeniepings
              - text: . One day, in the Mystic Town, another
              - link "princess" [ref=e680] [cursor=pointer]:
                - /url: /wiki/Jenny
              - text: took and snatched the Master Key from Luckyping when her guard was down, locked her up in a box, and sent her to Earth via a portal.
            - heading "Secret Catch! Key Teeniepings Sign in to edit" [level=3] [ref=e681]:
              - link "Secret Catch! Key Teeniepings" [ref=e683] [cursor=pointer]:
                - /url: /wiki/Secret_Catch!_Key_Teeniepings
              - link "Sign in to edit" [ref=e685] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D12&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e686]
            - figure "Luckyping's box fell on Trueping" [ref=e688]:
              - link "Luckyping's box fell on Trueping view image" [ref=e689] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/e/ef/S3E01_-_Trueping_eyeballs_almost_pop_out.png/revision/latest?cb=20250226060023
                - img "Luckyping's box fell on Trueping" [ref=e690]
                - generic "view image" [ref=e693]:
                  - img [ref=e694]
              - paragraph [ref=e697]: Luckyping's box fell on Trueping
            - paragraph [ref=e698]:
              - text: Luckyping appears trapped inside a box. She falls onto
              - link "Trueping" [ref=e699] [cursor=pointer]:
                - /url: /wiki/Trueping
              - text: as he explains his and the
              - link "Royal Key Teeniepings" [ref=e700] [cursor=pointer]:
                - /url: /wiki/Royal_Key_Teeniepings
              - text: "' situation to"
              - link "Romi" [ref=e701] [cursor=pointer]:
                - /url: /wiki/Romi
              - text: ","
              - link "Maya" [ref=e702] [cursor=pointer]:
                - /url: /wiki/Maya
              - text: ", and"
              - link "Marylou" [ref=e703] [cursor=pointer]:
                - /url: /wiki/Marylou
              - text: after they fell to Earth.
            - figure "Luckyping's box begging them to take her" [ref=e704]:
              - link "Luckyping's box begging them to take her view image" [ref=e705] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/d/d2/S3E01_-_The_Teenieping_in_the_box_begging_the_others_to_take_her.png/revision/latest?cb=20250226060354
                - img "Luckyping's box begging them to take her" [ref=e706]
                - generic "view image" [ref=e709]:
                  - img [ref=e710]
              - paragraph [ref=e713]: Luckyping's box begging them to take her
            - paragraph [ref=e714]:
              - text: Upon landing, she gets quite anxious and arrogant, as she questions what's happened to her. This doesn't please Romi, and she winds up leaving Luckyping behind, but she ends up crying and begging to be taken in. Romi winds up carrying her to
              - link "Heartrose Bakery" [ref=e715] [cursor=pointer]:
                - /url: /wiki/Heartrose_Bakery
              - text: ", and she stays with her and the"
              - link "Royal Key Teeniepings" [ref=e716] [cursor=pointer]:
                - /url: /wiki/Royal_Key_Teeniepings
              - text: for the rest of the season.
            - heading "Lucky Cookie Full of Fortune Sign in to edit" [level=3] [ref=e717]:
              - link "Lucky Cookie Full of Fortune" [ref=e719] [cursor=pointer]:
                - /url: /wiki/Lucky_Cookie_Full_of_Fortune
              - link "Sign in to edit" [ref=e721] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLuckyping%3Fveaction%3Dedit%26section%3D13&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e722]
            - figure "Luckyping's box with Okeydokeyping's drawings" [ref=e724]:
              - link "Luckyping's box with Okeydokeyping's drawings view image" [ref=e725] [cursor=pointer]:
