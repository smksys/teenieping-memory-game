            - paragraph [ref=e734]:
              - text: She remains in her box, but gotten drawn by
              - link "Okeydokeyping" [ref=e735] [cursor=pointer]:
                - /url: /wiki/Okeydokeyping
              - text: some silly drawings, which made them laugh at Luckyping, Luckyping got a bit arrogant from their disrespectful actions, and is questionable on why their laughter are coming to her by a silly doodle.
            - figure "Luckyping's box rejecting the cookie" [ref=e736]:
              - link "Luckyping's box rejecting the cookie view image" [ref=e737] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/c/c6/S3E13_-_The_box_rejecting_the_Lucky_Cookie.png/revision/latest?cb=20250226060359
