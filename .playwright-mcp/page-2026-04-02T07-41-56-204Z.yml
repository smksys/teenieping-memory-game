              - text: Joahping can help Romi transform into
              - link "Princess Emerald" [ref=e576] [cursor=pointer]:
                - /url: /wiki/Princesses
              - text: ; when Romi starts the transformation, she will appear and kiss Romi in order to transform. When transformed, Romi can use the power of her various tools as well as Joahping's to carry out the task at hand.
            - heading "Patting of Kindness Sign in to edit" [level=3] [ref=e577]:
              - text: Patting of Kindness
              - link "Sign in to edit" [ref=e579] [cursor=pointer]:
