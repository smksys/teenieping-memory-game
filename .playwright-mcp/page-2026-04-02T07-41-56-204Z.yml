            - paragraph [ref=e649]: Joahping makes her first appearance alongside Teeheeping and Trustping, attempting to steal the Jewel Heartwing Phone to save their Jewel Forest friends despite not being fully trained; however, they got caught by Teacher Lalaping and Chachaping, but the three managed to escape successfully.
            - figure "Joahping hears something" [ref=e650]:
              - link "Joahping hears something view image" [ref=e651] [cursor=pointer]:
