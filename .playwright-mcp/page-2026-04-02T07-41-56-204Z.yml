              - paragraph [ref=e801]: She and her friends graduating
            - paragraph [ref=e802]:
              - text: Joahping is recognized for catching all the Jewel Teeniepings along with Teeheeping and Trustping, and she is granted graduation from
              - link "Teenieping School" [ref=e803] [cursor=pointer]:
                - /url: /wiki/Teenieping_School
              - text: and promotion to Royal Teenieping. After that, she and her friends went into the cake box and came out, and after enjoying a fancy graduation party, she sings
              - link "Jewel Teenieping Song" [ref=e804] [cursor=pointer]:
                - /url: /wiki/Jewel_Teenieping_Song
              - text: as her graduation song. After the graduation ceremony, while looking at photos on Romi's
              - link "Jewel Heart Wing Phone" [ref=e805] [cursor=pointer]:
                - /url: /wiki/Jewel_Heart_Wing_Phone
              - text: ", she reminisces about many things that happened on Earth. But when she first came to Earth, a photo emerged of her being chased by a raccoon while trying to give her a kind pat. She was embarrassed and tried to explain herself by saying that it was her first time, and she was clumsy. Then, when she sees Romi sad about her breakup, she creates an Imperial Stone with other jewels and gives it to her as a gift. After that, just as she was about to get on a taxi to the kingdom, she didn't want to be separated and saw Teeheeping and Trustping crying, and Romi bursting into tears upon seeing this, and she also burst into tears."
