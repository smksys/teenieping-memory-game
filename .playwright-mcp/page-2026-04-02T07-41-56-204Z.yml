                - img [ref=e746]
            - figure "Joahping using her Tinkle Puff on a pigeon" [ref=e748]:
              - link "Joahping using her Tinkle Puff on a pigeon view image" [ref=e749] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/a/a8/S2E07_-_Joahping_using_her_powers_on_a_bird.jpg/revision/latest?cb=20241005021829
