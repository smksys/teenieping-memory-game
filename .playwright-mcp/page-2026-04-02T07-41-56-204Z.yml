              - paragraph [ref=e713]: The Trainee Royals gathering food
            - paragraph [ref=e714]: Now that the three are enrolled into the school, they were about to begin lessons until Teeheeping became hungry, a food truck appeared that will only be for the first day of class, the trio were excited to get food. However Teeheeping forced Joahping eat a broccoli, Joahping will eat it just this once. They fell asleep fast.
