            - heading "Appearance Sign in to edit" [level=2] [ref=e512]:
              - text: Appearance
              - link "Sign in to edit" [ref=e514] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FJoahping%3Fveaction%3Dedit%26section%3D1&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e515]
            - figure "Joahping's Appearance" [ref=e517]:
              - link "Joahping's Appearance view image" [ref=e518] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/e/e2/Joahping_Render_6.png/revision/latest?cb=20260215073417
                - img "Joahping's Appearance" [ref=e519]
                - generic "view image" [ref=e522]:
                  - img [ref=e523]
              - paragraph [ref=e526]: Joahping's Appearance
            - paragraph [ref=e527]: Joahping is an emerald-themed Teenieping.
            - paragraph [ref=e528]: She has a light-yellow body, green eyes, a black nose, and short, yellow bangs, and long yellow hair which is colored amber orange at the end.
            - paragraph [ref=e529]: She wears a coral pink tiara with a green colored emerald inside, and a collar that has the same or identical pattern at the end of her hair; the collar is colored orange and has a gold button on it.
            - paragraph [ref=e530]: Her prop is a yellow hairbrush with a green gemstone and butterfly on it.
            - heading "Personality Sign in to edit" [level=2] [ref=e531]:
              - text: Personality
              - link "Sign in to edit" [ref=e533] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FJoahping%3Fveaction%3Dedit%26section%3D2&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e534]
            - paragraph [ref=e536]:
              - text: Joahping is a kind, warm-hearted, and gentle Teenieping who always keeps a friendly and polite demeanor to everyone she meets. Her sensitive nature allows her to connect and empathize with others, letting her provide compassion and comfort to those who need it. She tends to see the beauty in things others find ugly, as shown in "
              - link "Where's My Muse, Sculpt?" [ref=e537] [cursor=pointer]:
                - /url: /wiki/Where%27s_My_Muse,_Sculpt%3F
              - text: "\""
            - paragraph [ref=e538]:
              - text: While these traits make her seem naive and meek, Joahping can show moments of assertiveness and leadership when needed. In "
              - link "Shrinking Romi!" [ref=e539] [cursor=pointer]:
                - /url: /wiki/Shrinking_Romi!
              - text: "\", Joahping fearlessly calmed down a pigeon, led"
              - link "Teeheeping" [ref=e540] [cursor=pointer]:
                - /url: /wiki/Teeheeping
              - text: and
              - link "Trustping" [ref=e541] [cursor=pointer]:
                - /url: /wiki/Trustping
              - text: to find Romi, convinced
              - link "Timidping" [ref=e542] [cursor=pointer]:
                - /url: /wiki/Timidping
              - text: to stop hiding, and even gained the courage to transform with Romi for the first time to save
              - link "Timidping" [ref=e543] [cursor=pointer]:
                - /url: /wiki/Timidping
              - text: .
            - paragraph [ref=e544]: Despite clearly being more polite and friendlier than her friends, Joahping is considered a troublemaker as she tags along with them, even in troublesome situations.
            - heading "Etymology Sign in to edit" [level=2] [ref=e545]:
              - text: Etymology
              - link "Sign in to edit" [ref=e547] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FJoahping%3Fveaction%3Dedit%26section%3D3&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e548]
            - list [ref=e550]:
              - listitem [ref=e551]: The Korean name 조아핑 ("Joaping") comes from the word 좋아 ("Joh-a"), which means "good". It could also be derived from the word 좋다 ("Johda"), which means "good" or "kind" in the third adjective form.
              - listitem [ref=e552]: The Chinese name 赞赞萌可 ("Zàn zàn méng kě") comes from 赞 ("Zàn"), which by itself means "to praise", "to assist", or "to support".
              - listitem [ref=e553]: The Japanese name ココピン ("Kokopin") comes from the phrase 真心/まごころ ("Magokoro/ma go koro"), which means "sincerity", "true heart", or "devotion".
