            - paragraph [ref=e701]:
              - text: Romi was given a package with the
              - link "Teenieping School" [ref=e702] [cursor=pointer]:
                - /url: /wiki/Teenieping_School
              - text: ", Joahping agrees that it will help her with her studies while the others just misbehaves. Suddendly, Teeheeping rings the bell then Trustping came along, Joahping tried to stop Trustping but ends up swinging with them, then"
              - link "Heartsping" [ref=e703] [cursor=pointer]:
                - /url: /wiki/Heartsping
              - text: applies her magic to them to end their misbehavior.
            - figure "The Trainee Royals gathering food" [ref=e704]:
