              - text: . While searching him, she meets
              - link "Patping" [ref=e737] [cursor=pointer]:
                - /url: /wiki/Patping
              - text: ", her childhood friend; she brings Patping to Heartrose Bakery and introduces her to"
              - link "Romi" [ref=e738] [cursor=pointer]:
                - /url: /wiki/Romi
              - text: and
              - link "Heartsping" [ref=e739] [cursor=pointer]:
                - /url: /wiki/Heartsping
              - text: ", but during the introduction, Joahping's voice is like super-duper fast! Then,"
              - link "Princess Sapphire" [ref=e740] [cursor=pointer]:
                - /url: /wiki/Princesses
              - text: ", who was unaware of the situation, blocks Patping's attempt to catch her, and when all of Patping's magic finally takes effect, she is told that Princess Sapphire can catch her only then."
            - heading "Shrinking Romi! Sign in to edit" [level=4] [ref=e741]:
              - link "Shrinking Romi!" [ref=e743] [cursor=pointer]:
                - /url: /wiki/Shrinking_Romi!
              - link "Sign in to edit" [ref=e745] [cursor=pointer]:
