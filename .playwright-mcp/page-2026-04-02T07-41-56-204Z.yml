                - generic "view image" [ref=e753]:
                  - img [ref=e754]
              - paragraph [ref=e757]: Joahping using her Tinkle Puff on a pigeon
            - paragraph [ref=e758]:
              - text: Joahping and her classmates were lessoning about Dangerous Creatures in the Earth. However a pigeon entered the bakery which causes mayhem. Joahping uses her magic to make the pigeon calm and become friendly. Soon enough, Joahping says goodbye to the pigeon when it was going to leave. However a
              - link "mysterious Teenieping" [ref=e759] [cursor=pointer]:
                - /url: /wiki/Maskping
              - text: comes along, which made Heartsping leave, Joahping got concerned and told everyone about it.
            - paragraph [ref=e760]: Afterwards, Romi, Marylou, and Maya spotted Timidping, however Timidping made the 3 shrunk into teenieping sized then Romi and her friends got missing. Teeheeping, Joahping, and Trustping went to look for them, Joahping went to communicate with animals if they saw something, but the animals ignored her, untill 2 pigeons came by and alerted them.
            - paragraph [ref=e761]: One of the pigeons found Timidping, attracting Teeheeping, Joahping, and Trustping's attention. The three began to chase Timidping, Timidping was afraid and told them that its best to hide. Joahping got angry and confronted him that if you hide, nothing will happen, and mentions that they hsve similar hometowns, as well as making Timidping help them bring Romi and her friends back to normal.
            - paragraph [ref=e762]: The four rode on the pigeons that were controlled by Joahping, in a search for Romi and the others, they found Romi and her friends, now that they have been back to normal, Trustping overjoyed which makes the pigeons frightened, Joahping tried to calm down the pigeons untill Timidping started falling.
            - figure "Joahping transforming" [ref=e763]:
              - link "Joahping transforming view image" [ref=e764] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/6/6b/S2_-_Joahping_brushing_her_hair.jpg/revision/latest?cb=20250304090001
                - img "Joahping transforming" [ref=e765]
                - generic "view image" [ref=e768]:
                  - img [ref=e769]
              - paragraph [ref=e772]: Joahping transforming
            - paragraph [ref=e773]: Romi forced Joahping to transform in order to save Timidping, Joahping was afraid, as she never did her transformation power, but Joahping cared for Timidping, and assisted Romi in transforming. Romi saved Timidping, Joahping went to Timidping and smiled because of him, she was able to do transformation magic, with Timidping blushing.
