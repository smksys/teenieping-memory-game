              - text: and
              - link "Trustping" [ref=e784] [cursor=pointer]:
                - /url: /wiki/Trustping
              - text: . Although it was a bit difficult at first, she succeeded in winning the final battle, the tower building battle, and successfully completed the training that the Royal Emotion Teeniepings gave them.
