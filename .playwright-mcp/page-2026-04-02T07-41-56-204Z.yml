            - figure "Joahping using her Tinkle Puff" [ref=e582]:
              - link "Joahping using her Tinkle Puff view image" [ref=e583] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/a/a8/S2E07_-_Joahping_using_her_powers_on_a_bird.jpg/revision/latest?cb=20241005021829
                - img "Joahping using her Tinkle Puff" [ref=e584]
                - generic "view image" [ref=e587]:
                  - img [ref=e588]
              - paragraph [ref=e591]: Joahping using her Tinkle Puff
            - paragraph [ref=e592]:
              - text: With her hairbrush, Joahping can sprinkle Patting of Kindness to communicate with and control animals by brushing or sprinkling
              - link "Tinkle Puff" [ref=e593] [cursor=pointer]:
                - /url: /wiki/Tinkle_Puff
              - text: to them. By showering flocks of lost migratory birds with the Patting of Kindness, Joahping can instinctively guide them back onto their correct migratory paths, preventing them from perishing due to misdirection.
            - figure "A pigeon being controlled" [ref=e594]:
              - link "A pigeon being controlled view image" [ref=e595] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/b/b3/S2E07_-_A_bird_being_controlled.jpg/revision/latest?cb=20250226053950
                - img "A pigeon being controlled" [ref=e596]
                - generic "view image" [ref=e599]:
                  - img [ref=e600]
              - paragraph [ref=e603]: A pigeon being controlled
            - paragraph [ref=e604]: However, when wild animals encroach on human settlements, Joahping can use the Patting of Kindness to gently encourage them to return to their natural habitats without resorting to harmful deterrents.
