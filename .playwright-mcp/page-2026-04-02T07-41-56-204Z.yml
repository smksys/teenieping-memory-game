                  - img [ref=e656]
              - paragraph [ref=e659]: Joahping hears something
            - paragraph [ref=e660]: They find Earth a really dangerous place, until they find donuts to eat, Joahping mentions that they should hesitate in eating otherwise the man will notice that his donuts disappear until she and the two got caught by Romi and Heartsping and a chase begins.
            - figure "Romi saves Joahping alongside the others" [ref=e661]:
