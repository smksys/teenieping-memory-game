              - paragraph [ref=e670]: Romi saves Joahping alongside the others
            - paragraph [ref=e671]: Teeheeping, Joahping, and Trustping run away so that Romi won't get the Jewel Heart Wing Phone. The three are really good at dodging making Romi having a hard time to catch. Finally, they all go to the construction area and when inside something which causes a dead end for the three. Teeheeping, Joahping, and Trustping explained on why they have to steal the phone, then when they start to fall, Romi saves the three.
