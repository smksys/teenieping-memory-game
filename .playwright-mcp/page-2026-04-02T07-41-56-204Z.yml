              - link "Lalaping" [ref=e690] [cursor=pointer]:
                - /url: /wiki/Lalaping
              - text: discourages Joahping and her friends and being mean to them because they aren't even official Royal Teeniepings.
            - figure "The Royals getting dizzy by Heartsping's magic" [ref=e691]:
