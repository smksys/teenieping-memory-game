            - paragraph [ref=e627]:
              - text: Patping is Joahping's best friend from the Jewel Forest. Joahping appreciates Patping's support and encouragement, which is how she was able to be accepted into the Royal Teenieping School. Upon being reunited again, the two are overjoyed and comment on how much they missed each other. Throughout "
              - link "Pat Pat~ It's Ok~" [ref=e628] [cursor=pointer]:
                - /url: /wiki/Pat_Pat~_It%27s_Ok~
              - text: "\", Patping remains by Joahping's side and goes along with her plan to help Kyle, so she would feel comforted."
