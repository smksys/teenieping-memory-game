            - paragraph [ref=e733]:
              - text: Joahping thinks that she's not good enough to be a
              - link "Royal Teenieping" [ref=e734] [cursor=pointer]:
                - /url: /wiki/Royal_Teeniepings
              - text: . Afterwards,
              - link "Kyle" [ref=e735] [cursor=pointer]:
