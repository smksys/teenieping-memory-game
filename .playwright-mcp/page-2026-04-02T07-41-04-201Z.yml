                - img [ref=e806]
            - paragraph [ref=e808]:
              - text: When
              - link "Dr. Monziu" [ref=e809] [cursor=pointer]:
                - /url: /wiki/Dr._Monziu
              - text: calls Romi (as she's transformed into Princess Diaheart), she takes
              - link "Dr. Monziu" [ref=e810] [cursor=pointer]:
                - /url: /wiki/Dr._Monziu
              - text: "'s phone to scold the student Teeniepings for stealing the Jewel Heart Wing Phone without warning them. Heartsping tries to step in and calm her down, but she's still angry."
            - heading "Royal Teenieping Face-Off! Sign in to edit" [level=4] [ref=e811]:
              - link "Royal Teenieping Face-Off!" [ref=e813] [cursor=pointer]:
