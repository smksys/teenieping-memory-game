              - text: to challenge the
              - link "student Royal Teeniepings" [ref=e822] [cursor=pointer]:
                - /url: /wiki/Royal_Jewel_Teeniepings
              - text: to a duel upon realizing their progress in catching the
              - link "Jewel Teeniepings" [ref=e823] [cursor=pointer]:
                - /url: /wiki/Jewel_Teeniepings
              - text: has been lackluster.
            - heading "Teenieping School Graduation Sign in to edit" [level=4] [ref=e824]:
