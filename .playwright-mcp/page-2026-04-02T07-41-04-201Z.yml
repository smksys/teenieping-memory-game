                - img [ref=e735]
            - paragraph [ref=e737]:
              - text: At some point in her life, Lalaping becomes a Royal Teenieping, alongside her Royal Emotion Teenieping comrades. She then becomes one of the Teeniepings released to Earth from the
              - link "Cube Chamber" [ref=e738] [cursor=pointer]:
                - /url: /wiki/Cube_Chamber
              - text: .
            - heading "Catch! Teenieping Sign in to edit" [level=3] [ref=e739]:
              - link "Catch! Teenieping" [ref=e741] [cursor=pointer]:
                - /url: /wiki/Catch!_Teenieping_(season)
              - link "Sign in to edit" [ref=e743] [cursor=pointer]:
