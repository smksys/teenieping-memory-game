                - img [ref=e655]
            - paragraph [ref=e657]:
              - text: Like her
              - link "Royal Teenieping comrades" [ref=e658] [cursor=pointer]:
                - /url: /wiki/Royal_Teeniepings
              - text: ", by kissing"
              - link "Romi" [ref=e659] [cursor=pointer]:
                - /url: /wiki/Romi
              - text: ", Lalaping can help Romi transform into a magical princess. She can transform with Romi into"
              - link "Princess Melody" [ref=e661] [cursor=pointer]:
                - /url: /wiki/Princesses
              - text: .
            - heading "Tinkle Puff Sign in to edit" [level=3] [ref=e662]:
