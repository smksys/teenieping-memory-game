                - img [ref=e751]
            - figure "Lalaping with bandages" [ref=e753]:
              - link "Lalaping with bandages view image" [ref=e754] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/8/83/S1E12_-_Lalaping_fine.png/revision/latest?cb=20210926064726
                - img "Lalaping with bandages" [ref=e755]
                - generic "view image" [ref=e758]:
                  - img [ref=e759]
              - paragraph [ref=e762]: Lalaping with bandages
            - paragraph [ref=e763]:
              - text: Lalaping is walking through the forest in search of Romi. She winds up annoying some animals with her singing, so much so that a raccoon scares her and chases her into
              - link "Harmony Town" [ref=e764] [cursor=pointer]:
                - /url: /wiki/Harmony_Town
              - text: .
            - paragraph [ref=e765]:
              - text: When she's able to tame it by using her magic to make it dance, she slips and falls into a tin can, getting stuck.
              - link "Dua" [ref=e766] [cursor=pointer]:
                - /url: /wiki/Dua
              - text: discovers her on her way home from school, and Lalaping introduces herself.
            - paragraph [ref=e767]:
              - text: Dua takes her
              - link "home" [ref=e768] [cursor=pointer]:
                - /url: /wiki/Harmony_Town_Villas
              - text: to mend her injuries. In return, Lalaping uses her magic to help Dua overcome her fear of singing in front of her classmates when the latter confesses it to her. However, a transformed Romi and Heartsping capture her, assuming she doesn't want to get caught and considering Dua's problem.
            - figure "Lalaping encouraging Dua" [ref=e769]:
              - link "Lalaping encouraging Dua view image" [ref=e770] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/6/63/S1E12_-_Lalaping_encouraging_Dua.png/revision/latest?cb=20210926064711
                - img "Lalaping encouraging Dua" [ref=e771]
                - generic "view image" [ref=e774]:
                  - img [ref=e775]
              - paragraph [ref=e778]: Lalaping encouraging Dua
            - paragraph [ref=e779]: After hearing Dua practice her singing, Lalaping explains herself, and Romi & Heartsping apologize to her, and let her go so that she can help Dua.
            - heading "Twinkle Catch! Teenieping Sign in to edit" [level=3] [ref=e780]:
              - link "Twinkle Catch! Teenieping" [ref=e783] [cursor=pointer]:
                - /url: /wiki/Twinkle_Catch!_Teenieping
              - link "Sign in to edit" [ref=e785] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLalaping%3Fveaction%3Dedit%26section%3D12&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e786]
            - paragraph [ref=e788]:
              - text: After all of the
              - link "Emotion Teeniepings" [ref=e789] [cursor=pointer]:
                - /url: /wiki/Emotion_Teeniepings
              - text: are caught, Lalaping returns to the Emotions Kingdom along with the other Royal Emotion Teeniepings (except for Heartsping) to resume her role as a teacher at the Royal Teenieping School.
            - heading "Twinkle Twinkle, Jewel Teeniepings Sign in to edit" [level=4] [ref=e790]:
              - link "Twinkle Twinkle, Jewel Teeniepings" [ref=e792] [cursor=pointer]:
                - /url: /wiki/Twinkle_Twinkle,_Jewel_Teeniepings
              - link "Sign in to edit" [ref=e794] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLalaping%3Fveaction%3Dedit%26section%3D13&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e795]
            - paragraph [ref=e797]:
              - text: She and
              - link "Chachaping" [ref=e798] [cursor=pointer]:
                - /url: /wiki/Chachaping
              - text: alert Dr. Monziu - as he’s trying to introduce Romi’s new magical tools after overhearing the
              - link "Jewel Forest" [ref=e799] [cursor=pointer]:
                - /url: /wiki/Jewel_Forest
              - text: crisis - that the
              - link "Jewel Heart Wing Phone" [ref=e800] [cursor=pointer]:
                - /url: /wiki/Jewel_Heart_Wing_Phone
              - text: has gone missing. When they search the Emotions Kingdom for the culprit, they find the Royal Teenieping students have stolen the Phone and are leaving in the Teenieping Bus.
            - heading "Welcome to Teenieping School! Sign in to edit" [level=4] [ref=e801]:
              - link "Welcome to Teenieping School!" [ref=e803] [cursor=pointer]:
                - /url: /wiki/Welcome_to_Teenieping_School!
              - link "Sign in to edit" [ref=e805] [cursor=pointer]:
