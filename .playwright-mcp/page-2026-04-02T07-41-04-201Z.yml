                - img [ref=e829]
            - paragraph [ref=e831]:
              - text: She and the other Royal Emotion Teeniepings (except for
              - link "Happying" [ref=e832] [cursor=pointer]:
                - /url: /wiki/Happying
              - text: ) arrive at the bakery to watch the graduation of the Jewel Teeniepings.
            - heading "Trivia Sign in to edit" [level=2] [ref=e833]:
              - text: Trivia
              - link "Sign in to edit" [ref=e835] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLalaping%3Fveaction%3Dedit%26section%3D17&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e836]
            - list [ref=e838]:
              - listitem [ref=e839]:
                - text: Lalaping and
                - link "Ariaping" [ref=e840] [cursor=pointer]:
                  - /url: /wiki/Ariaping
                - text: "share some similarities: they're both Teeniepings that are purple and have an interest in music."
              - listitem [ref=e841]: She is one of only two Royal Teeniepings to have been caught by Romi. Gogoping is the first.
              - listitem [ref=e842]:
                - text: According to the
