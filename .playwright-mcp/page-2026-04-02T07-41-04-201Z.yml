            - heading "Appearance Sign in to edit" [level=2] [ref=e593]:
              - text: Appearance
              - link "Sign in to edit" [ref=e595] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLalaping%3Fveaction%3Dedit%26section%3D1&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e596]
            - figure "Lalaping's Appearance" [ref=e598]:
              - link "Lalaping's Appearance view image" [ref=e599] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/e/e9/Lalaping_Render_2.png/revision/latest?cb=20260215105234
                - img "Lalaping's Appearance" [ref=e600]
                - generic "view image" [ref=e603]:
                  - img [ref=e604]
              - paragraph [ref=e607]: Lalaping's Appearance
            - paragraph [ref=e608]: Lalaping is a purple music-themed Teenieping.
            - paragraph [ref=e609]: She has a lavender body, a dark purple collar with a golden button attached, and a white underbelly with a golden Royal Symbol. She has long eyelashes with brown irises on her eyes.
            - paragraph [ref=e610]: She has purple hair tied by a purple ribbon with a yellow musical note-like extrusion. Her tufts resemble dog or bunny ears.
            - paragraph [ref=e611]: She also has a short, light purple tail that resembles a cotton ball.
            - paragraph [ref=e612]: Her prop is a yellow microphone with a purple bow on it.
            - heading "Monster Form Sign in to edit" [level=3] [ref=e613]:
              - text: Monster Form
              - link "Sign in to edit" [ref=e615] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLalaping%3Fveaction%3Dedit%26section%3D2&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e616]
            - figure "Lalaping's Monster Appearance" [ref=e618]:
              - link "Lalaping's Monster Appearance view image" [ref=e619] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/7/71/Lalaping_Monster_Render_2.png/revision/latest?cb=20260215034024
                - img "Lalaping's Monster Appearance" [ref=e620]
                - generic "view image" [ref=e623]:
                  - img [ref=e624]
              - paragraph [ref=e627]: Lalaping's Monster Appearance
            - paragraph [ref=e628]: In her monster form, she has the same hairstyle, but in a bigger and rounder fluffy body with her white patch being in a fire shape.
            - paragraph [ref=e629]: She has sharp teeth, purple eyes, a purple heart shaped nose, yellow claws with a white spot on her hands and feet, and a rabbit like tail.
            - heading "Personality Sign in to edit" [level=2] [ref=e630]:
              - text: Personality
              - link "Sign in to edit" [ref=e632] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLalaping%3Fveaction%3Dedit%26section%3D3&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e633]
            - paragraph [ref=e635]: True to her concept, Lalaping has a colorful personality. She is extroverted, energetic, and cheerful with a passion for music, and especially likes to sing and dance. Lalaping can be loud and obnoxious sometimes, especially when singing, which unknowingly causes disturbance or annoyance for others around her.
            - paragraph [ref=e636]:
              - text: Lalaping has a helpful and encouraging side. In "
              - link "Let's Sing With Joy" [ref=e637] [cursor=pointer]:
                - /url: /wiki/Let%27s_Sing_With_Joy
              - text: "\", she helps"
              - link "Dua" [ref=e638] [cursor=pointer]:
                - /url: /wiki/Dua
              - text: practice her singing and encourages her when she sings in front of the class.
            - heading "Etymology Sign in to edit" [level=2] [ref=e639]:
              - text: Etymology
              - link "Sign in to edit" [ref=e641] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FLalaping%3Fveaction%3Dedit%26section%3D4&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e642]
            - list [ref=e644]:
              - listitem [ref=e645]: The Korean name 라라핑 ("Laraping") comes from "Lalala⁓", which is an onomatopoeia used to describe singing.
              - listitem [ref=e646]: The Chinese name 唱唱萌可 ("Chàng chàng méng kě") comes from 唱 ("Chàng"), which means "to sing". It can also be related to the word 唱歌 ("Chànggē"), which can mean "to sing a song".
            - heading "Magic Sign in to edit" [level=2] [ref=e647]:
              - text: Magic
              - link "Sign in to edit" [ref=e649] [cursor=pointer]:
