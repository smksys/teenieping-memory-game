                - img [ref=e816]
            - paragraph [ref=e818]:
              - text: Lalaping and the other
              - link "Royal Emotion Teeniepings" [ref=e819] [cursor=pointer]:
                - /url: /wiki/Royal_Emotion_Teeniepings
              - text: (except for
              - link "Happying" [ref=e820] [cursor=pointer]:
                - /url: /wiki/Happying
              - text: ) arrive at
              - link "Heartrose Bakery" [ref=e821] [cursor=pointer]:
