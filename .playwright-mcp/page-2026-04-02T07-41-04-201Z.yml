                - img [ref=e667]
            - paragraph [ref=e669]:
              - text: With her microphone, Lalaping can sprinkle
              - link "Tinkle Puff" [ref=e670] [cursor=pointer]:
                - /url: /wiki/Tinkle_Puff
              - text: to make people start dancing the Joyful Dance. She can also use it to translate words that others can't understand, like a baby's voice, or imitate others' voices.
