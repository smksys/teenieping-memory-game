            - paragraph [ref=e756]:
              - text: Chachaping and Lalaping alert
              - link "Dr. Monziu" [ref=e757] [cursor=pointer]:
                - /url: /wiki/Dr._Monziu
              - text: "- as he’s trying to introduce Romi’s new magical tools after overhearing the Jewel Forest crisis - that the Jewel Heart Wing Phone has gone missing. When they search the"
              - link "Emotions Kingdom" [ref=e758] [cursor=pointer]:
                - /url: /wiki/Emotions_Kingdom
              - text: for the culprit, they find the Royal Teenieping students have stolen the Phone and are leaving in the Teenieping Bus.
