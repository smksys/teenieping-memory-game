                - text: identifying
                - link "Weeping" [ref=e663] [cursor=pointer]:
                  - /url: /wiki/Weeping
            - paragraph [ref=e664]:
              - text: As Heartsping and Chachaping try to comfort Romi once she finds out that Sarah might be homesick, the three girls encounter
              - link "Weeping" [ref=e665] [cursor=pointer]:
                - /url: /wiki/Weeping
              - text: . She encourages Romi to cheer up and transform with her into Princess Clover for the first time. After Weeping traps her in a giant bubble due to the effects of her tear candies, Chachaping and Heartsping free Romi, but it causes her to cry profusely, causing multiple tear candies to fall out.
            - paragraph [ref=e666]: Chachaping uses the Water of Hope to stop the effects, and tells Romi that the effects of Weeping's Tinkle Puff have worked against her, and she has now become trapped in a bubble. Romi uses her magic to free her and catch Weeping.
            - heading "Gonna Tweet It All! Sign in to edit" [level=4] [ref=e667]:
              - link "Gonna Tweet It All!" [ref=e669] [cursor=pointer]:
                - /url: /wiki/Gonna_Tweet_It_All!
              - link "Sign in to edit" [ref=e671] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FChachaping%3Fveaction%3Dedit%26section%3D12&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e672]
            - figure "Chachaping wrapped in a blanket" [ref=e674]:
              - link "Chachaping wrapped in a blanket view image" [ref=e675] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/b/bd/S1E20_-_Chachaping_covered.png/revision/latest?cb=20210926063945
                - img "Chachaping wrapped in a blanket" [ref=e676]
                - generic "view image" [ref=e679]:
                  - img [ref=e680]
              - paragraph [ref=e683]: Chachaping wrapped in a blanket
            - paragraph [ref=e684]: Chachaping asks Romi if she can sleep in her bed for one night, which Romi allows. However, in a dream, Chachaping finds herself in the bathroom. She inadvertently winds up wetting the bed in real time to her and Romi's surprise. She pleads Romi to keep it a secret, which they do, but Tweetping winds up over-hearing this and shouts about it to the other Royal Emotion Teeniepings while they're asleep.
            - paragraph [ref=e685]: When they both wake up, Chachaping is upset with Romi, thinking that she had told the other Royal Emotion Teeniepings, who tease her for wetting the bed. But when they find out it's the work of Tweetping, and he's been causing more chaos at school - including learning that Tweetping is going to tell everyone a big secret, which Romi assumes is about her double-identity as both a student and a princess from a magical kingdom - they work together with Heartsping to catch him.
            - figure "Chachaping taking revenge on Tweetping" [ref=e686]:
              - link "Chachaping taking revenge on view image" [ref=e687] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/4/40/S1E20_-_Chachaping_wants_revenge_on_Tweetping.png/revision/latest?cb=20210926063954
                - img "Chachaping taking revenge on" [ref=e688]
                - generic "view image" [ref=e691]:
                  - img [ref=e692]
              - paragraph [ref=e695]:
                - text: Chachaping taking revenge on
                - link "Tweetping" [ref=e696] [cursor=pointer]:
                  - /url: /wiki/Tweetping
            - paragraph [ref=e697]: Chachaping uses her magic to cover up Tweetping's megaphone when he tries to let other secrets slip, and is sent into a rage when Tweetping tries to shout some more, causing a thundercloud to appear.
            - paragraph [ref=e698]: Tweetping goes into hiding in a bin on the outside of the school, but is convinced to come out by Romi after she presses him enough to make him spoil where he's hiding, causing Chachaping to open the bin and attack him.
            - paragraph [ref=e699]: This allows Romi to catch Tweetping, as she, Heartsping and Romi find out the real secret he was going to tell was that Romi forgot to wash her bedsheets after Chachaping wet them. Chachaping begs Romi not to tell Sarah about the incident, which Romi is able to cover up.
            - heading "Angry Roarping Sign in to edit" [level=4] [ref=e700]:
              - link "Angry Roarping" [ref=e702] [cursor=pointer]:
                - /url: /wiki/Angry_Roarping
              - link "Sign in to edit" [ref=e704] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FChachaping%3Fveaction%3Dedit%26section%3D13&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e705]
            - paragraph [ref=e707]: Chachaping notices that the flowers of Harmony Town are all wilted, and starts to get concerned. When she notices that it was the work of Roarping, she gets angry and demands to transform with Romi to sort out this debacle. This doesn't wind up working, as it only makes Roarping get angrier and pursues Marylou's bike - the source of his anger.
            - figure "Chachaping using Blankping's eraser" [ref=e708]:
              - link "Chachaping using 's eraser view image" [ref=e709] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/9/93/S1E23_-_Chachaping_using_Blankping_eraser.png/revision/latest?cb=20210926064036
                - img "Chachaping using 's eraser" [ref=e710]
                - generic "view image" [ref=e713]:
                  - img [ref=e714]
              - paragraph [ref=e717]:
                - text: Chachaping using
                - link "Blankping" [ref=e718] [cursor=pointer]:
                  - /url: /wiki/Blankping
                - text: "'s eraser"
            - paragraph [ref=e719]: In an attempt to stop him, Chachaping uses Blankping's eraser (after he stumbles and uses magic on himself, causing him to forget why he was summoned initally), and combines it with her Water of Hope to calm Roarping down and make him forget what he was angry about, allowing him to be caught by Romi.
