                - img [ref=e604]
            - paragraph [ref=e606]: At some point in her life, Chachaping becomes a Royal Teenieping, alongside her Royal Emotion Teenieping comrades. She then becomes one of the Teeniepings released to Earth from the Cube Chamber.
