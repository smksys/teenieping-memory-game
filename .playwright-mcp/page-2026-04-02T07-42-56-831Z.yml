              - text: ) arrive at
              - link "Heartrose Bakery" [ref=e768] [cursor=pointer]:
                - /url: /wiki/Heartrose_Bakery
              - text: to challenge the student Royal Teeniepings to a duel upon realizing their progress in catching the Jewel Teeniepings has been lackluster. She hosts the competition, while Dadaping, Gogoping, and Lalaping challenge them, clarifying what each game they play is testing.
