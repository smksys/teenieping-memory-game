                  - img [ref=e733]
              - paragraph [ref=e736]:
                - text: Chachaping and
                - link "Dadaping" [ref=e737] [cursor=pointer]:
                  - /url: /wiki/Dadaping
                - text: ice skating
            - paragraph [ref=e738]: "While chasing down Coolping, Chachaping comes up with an idea: she uses her watering can on the other Royal Emotion Teeniepings' feet to use as ice skates to navigate an ice floor created by Coolping and a spilt bucket. She's able to catch Coolping and spin him around, dizzying him so that Romi can catch him."
