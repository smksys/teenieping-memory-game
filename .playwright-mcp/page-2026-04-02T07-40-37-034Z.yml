              - paragraph [ref=e699]: Teeheeping and the others getting praised
            - paragraph [ref=e700]:
              - text: Teeheeping is recognized for catching all the Jewel Teeniepings along with
              - link "Joahping" [ref=e701] [cursor=pointer]:
                - /url: /wiki/Joahping
              - text: and
              - link "Trustping" [ref=e702] [cursor=pointer]:
                - /url: /wiki/Trustping
              - text: ", and she is granted graduation from"
              - link "Teenieping School" [ref=e703] [cursor=pointer]:
                - /url: /wiki/Teenieping_School
              - text: and promotion to a Royal Teenieping. After that, she and her friends went into the cake box and came out, and after enjoying a fancy graduation party, she sings
              - link "Jewel Teenieping Song" [ref=e704] [cursor=pointer]:
                - /url: /wiki/Jewel_Teenieping_Song
              - text: as her graduation song.
            - paragraph [ref=e705]:
              - text: After the graduation ceremony, while looking at photos on Romi's
              - link "Jewel Heart Wing Phone" [ref=e706] [cursor=pointer]:
                - /url: /wiki/Jewel_Heart_Wing_Phone
              - text: ", she reminisces about many things that happened on Earth. But when she first came to Earth, a picture of crayon scribbling on her face comes out when she was sleeping, she has a mental breakdown and asks when did she take this picture."
            - paragraph [ref=e707]:
              - text: Then, when she sees Romi sad about her breakup, she creates an
              - link "Imperial Stone" [ref=e708] [cursor=pointer]:
                - /url: /wiki/Imperial_Stone
              - text: with other Jewels and presents it to her. After that, as she was about to board a taxi to the kingdom, she cried because she didn't want to be separated.
