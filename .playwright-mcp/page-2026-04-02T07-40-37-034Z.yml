            - paragraph [ref=e679]:
              - text: Teeheeping will compete against the
              - link "Royal Emotion Teeniepings" [ref=e680] [cursor=pointer]:
                - /url: /wiki/Royal_Emotion_Teeniepings
              - text: along with
              - link "Joahping" [ref=e681] [cursor=pointer]:
                - /url: /wiki/Joahping
              - text: and
              - link "Trustping" [ref=e682] [cursor=pointer]:
                - /url: /wiki/Trustping
              - text: . Although it was a bit difficult at first, she succeeded in winning the final competition, the tower building competition. Successfully completed the training that the Royal Emotion Teeniepings planned for them.
