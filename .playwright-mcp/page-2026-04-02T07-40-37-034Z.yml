              - text: and
              - link "Trustping" [ref=e604] [cursor=pointer]:
                - /url: /wiki/Trustping
              - text: ", decides to go on Earth to free the Jewel Teeniepings. They first try to run away from Romi, but after she saves them, they decide to help her."
