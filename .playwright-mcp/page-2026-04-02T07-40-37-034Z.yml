            - figure "Teeheeping and Tickleping battling" [ref=e612]:
              - link "Teeheeping and Tickleping battling view image" [ref=e613] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/b/b7/S2E03_-_Teeheeping_Tickleping_fight_2.png/revision/latest?cb=20211218141809
                - img "Teeheeping and Tickleping battling" [ref=e614]
                - generic "view image" [ref=e617]:
                  - img [ref=e618]
              - paragraph [ref=e621]: Teeheeping and Tickleping battling
            - paragraph [ref=e622]:
              - text: As a precaution to catch
              - link "Tickleping" [ref=e623] [cursor=pointer]:
                - /url: /wiki/Tickleping
              - text: ", she takes first place in a tickling resistance test, transforms with"
              - link "Romi" [ref=e624] [cursor=pointer]:
                - /url: /wiki/Romi
              - text: ", and succeeds in transforming Romi into Princess Ruby. She then engages in a tickling competition with Tickleping, but she can't even use an ear pick, so she uses a round bristled toothbrush. But she still uses it to the tickling."
            - paragraph [ref=e625]: Although she was a little pushed back by Tickleping, she realized that Tickleping's real weak point was the soles of her feet and succeeded in catching Tickleping by targeting her. However, she used all her strength to resist the tickling and it tired her.
            - heading "Trustping Has Fainted! Sign in to edit" [level=4] [ref=e626]:
              - link "Trustping Has Fainted!" [ref=e628] [cursor=pointer]:
                - /url: /wiki/Trustping_Has_Fainted!
              - link "Sign in to edit" [ref=e630] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FTeeheeping%3Fveaction%3Dedit%26section%3D9&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e631]
            - paragraph [ref=e633]:
              - text: Teeheeping is revealed to always fight with
              - link "Trustping" [ref=e634] [cursor=pointer]:
                - /url: /wiki/Trustping
              - text: . She intercepts Trustping's answer during class, tries to eat the remaining tarts when Trustping intercepts him, and plays soccer in gym class. As she was trying to catch a pass, she used a self-immolation spell on the ball, causing Trustping to panic and get hit by the ball and a bucket of water.
            - paragraph [ref=e635]:
              - text: The two eventually got into a hand-to-hand fight, and were sent off and sentenced to volunteer work by cleaning up. However, while cleaning, Trustping suddenly loses energy and collapses. She is told to continue cleaning alone, which adds to her negative feelings toward him. However, Trustping does not recover until the next day, and contrary to what she thought was a simple cold,
              - link "Owwping" [ref=e636] [cursor=pointer]:
                - /url: /wiki/Owwping
              - text: diagnoses it as the '
              - link "Jewel Tomato Disease" [ref=e637] [cursor=pointer]:
                - /url: /wiki/Jewel_Tomato_Disease
              - text: "'."
            - figure "Teeheeping with the Jewel tomato seed" [ref=e638]:
              - link "Teeheeping with the Jewel tomato seed view image" [ref=e639] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/8/8c/S2E10_-_Teeheeping_find_the_Jewel_tomato_seeds_in_her_tiny_bag.jpg/revision/latest?cb=20240909064214
                - img "Teeheeping with the Jewel tomato seed" [ref=e640]
                - generic "view image" [ref=e643]:
                  - img [ref=e644]
              - paragraph [ref=e647]: Teeheeping with the Jewel tomato seed
            - paragraph [ref=e648]:
              - text: It is said that it is a disease that appears if you do not want to eat
              - link "Jewel Tomatoes" [ref=e649] [cursor=pointer]:
                - /url: /wiki/Jewel_Tomato
              - text: ", and the cure is also said to let Trustping eat Jewel tomatoes. After receiving a call from Dadaping that the"
              - link "Jewel Forest" [ref=e650] [cursor=pointer]:
                - /url: /wiki/Jewel_Forest
              - text: had lost its vitality and Trustping could not be saved, she took out the jewel tomato seeds she had brought with her when she came to Earth and planted them.
            - figure "Teeheeping taking good care of Trustping" [ref=e651]:
              - link "Teeheeping taking good care of Trustping view image" [ref=e652] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/9/99/S2E10_-_Teeheeping_holding_Trustping%27s_hand.png/revision/latest?cb=20250304091347
                - img "Teeheeping taking good care of Trustping" [ref=e653]
                - generic "view image" [ref=e656]:
                  - img [ref=e657]
              - paragraph [ref=e660]: Teeheeping taking good care of Trustping
            - paragraph [ref=e661]: She cultivated them most actively and nursed them most actively, and finally the jewel tomatoes opened and regained their energy. As she was looking for him, it turned out that he needed someone to fight with, so she looked like a tsundere and took good care of him.
            - heading "Royal Teenieping Face-Off! Sign in to edit" [level=4] [ref=e662]:
