                  - img [ref=e501]
              - paragraph [ref=e504]: Teeheeping's Appearance
            - paragraph [ref=e505]: Teeheeping is a purple ruby-themed Teenieping.
            - paragraph [ref=e506]: She has a light purple body, purple bangs, curly purple pigtails with a darker shade of purple on the end, and a purple bow with a ruby inside attached to her pigtails.
            - paragraph [ref=e507]: She has a purple collar with a red button on it and a curly tail, her pigtails are bumpy making it look like grapes and curled dark purple at the end.
            - paragraph [ref=e508]: Her prop is a purple confetti popper with light purple stripes, and a red jewel on it.
            - heading "Personality Sign in to edit" [level=2] [ref=e509]:
              - text: Personality
              - link "Sign in to edit" [ref=e511] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FTeeheeping%3Fveaction%3Dedit%26section%3D2&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e512]
            - figure "Teeheeping in her transformation" [ref=e514]:
              - link "Teeheeping in her transformation view image" [ref=e515] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/d/d3/S2_-_Teeheeping_popping_her_confetti.jpg/revision/latest?cb=20250304091219
                - img "Teeheeping in her transformation" [ref=e516]
                - generic "view image" [ref=e519]:
                  - img [ref=e520]
              - paragraph [ref=e523]: Teeheeping in her transformation
            - paragraph [ref=e524]: Teeheeping is a mischievous and snarky tomboy, which is evident in her love for pulling pranks, her tendency to tease others, and her energetic behavior.
            - paragraph [ref=e525]: Being the Teenieping of laughter, Teeheeping is cheerful and outgoing, often seen with a smile on her face and always engaging herself in fun activities.
            - paragraph [ref=e526]:
              - text: Like
              - link "Trustping" [ref=e527] [cursor=pointer]:
                - /url: /wiki/Trustping
              - text: ", Teeheeping can be immature, occasionally getting into petty arguments with the former. Despite her apparent mischief and playfulness, Teeheeping can show seriousness and determination, usually when it comes to catching Teeniepings. An example of this is when she, along with Trustping and"
              - link "Joahping" [ref=e528] [cursor=pointer]:
                - /url: /wiki/Joahping
              - text: ", took the"
              - link "Jewel Heart Wing Phone" [ref=e529] [cursor=pointer]:
                - /url: /wiki/Jewel_Heart_Wing_Phone
              - text: to save her fellow Jewel Teeniepings, despite the fact that they are only students.
            - heading "Etymology Sign in to edit" [level=2] [ref=e530]:
              - text: Etymology
              - link "Sign in to edit" [ref=e532] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FTeeheeping%3Fveaction%3Dedit%26section%3D3&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e533]
            - list [ref=e535]:
              - listitem [ref=e536]: The Korean name 방글핑 ("Banggeulping") comes from 방글방글 (Bang-geul-bang-geul), which is an onomatopoeia for laughter in Korean.
              - listitem [ref=e537]: The English name Teeheeping comes from the word "tee-hee!", an onomatopoeia used to describe a giggle or titter.
              - listitem [ref=e538]: The Chinese name 笑笑萌可 ("Xiào xiào méng kě") comes from 笑声 ("Xiàoshēng"), which means "laughter".
              - listitem [ref=e539]: The Japanese name ニコピン ("Nikopin") comes from ニコニコ ("Nikoniko"), which is an onomatopoeia describing "laughing" or "smiling".
            - heading "Magic Sign in to edit" [level=2] [ref=e540]:
