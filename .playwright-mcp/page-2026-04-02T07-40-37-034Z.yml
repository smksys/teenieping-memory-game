                - img [ref=e714]
            - paragraph [ref=e716]:
              - text: Teeheeping,
              - link "Joahping" [ref=e717] [cursor=pointer]:
                - /url: /wiki/Joahping
              - text: ", and"
              - link "Trustping" [ref=e718] [cursor=pointer]:
                - /url: /wiki/Trustping
              - text: went to the
              - link "Jewel Cavern" [ref=e719] [cursor=pointer]:
                - /url: /wiki/Jewel_Cavern
              - text: to give
              - link "Romi" [ref=e720] [cursor=pointer]:
                - /url: /wiki/Romi
              - text: the
              - link "Imperial Stone" [ref=e721] [cursor=pointer]:
                - /url: /wiki/Imperial_Stone
              - text: . Then, in the
              - link "Emotions Kingdom" [ref=e722] [cursor=pointer]:
                - /url: /wiki/Emotions_Kingdom
              - text: ", they received the Royal symbol."
