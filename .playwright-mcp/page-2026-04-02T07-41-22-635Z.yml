              - text: Season 1
              - link "Sign in to edit" [ref=e541] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D2&uselang=en&metadata=article-registration-edit-article-section
