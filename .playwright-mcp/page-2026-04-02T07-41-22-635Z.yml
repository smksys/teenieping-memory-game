                - /url: /wiki/Catch!_Teenieping_(season)
              - text: .
            - paragraph [ref=e441]:
              - text: While in the
              - link "Emotions Kingdom" [ref=e442] [cursor=pointer]:
                - /url: /wiki/Emotions_Kingdom
              - text: ", guided by"
              - link "Egoping" [ref=e443] [cursor=pointer]:
                - /url: /wiki/Egoping
              - text: "'s voice, she ate the"
              - link "Yummy Fruit" [ref=e444] [cursor=pointer]:
                - /url: /wiki/Yummy_Fruit
              - text: ", a dangerous fruit that transforms every Teenieping that eats it into their complete opposite, making her, the cheerful and innocent Teenieping, become her evil alter-ego, Giggleping."
