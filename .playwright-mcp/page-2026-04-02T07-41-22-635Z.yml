              - link "Happying's S1 Appearance view image" [ref=e545] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/c/c3/Happying_S1_Render_2.png/revision/latest?cb=20260218204643
                - img "Happying's S1 Appearance" [ref=e546]
                - generic "view image" [ref=e549]:
                  - img [ref=e550]
              - paragraph [ref=e553]: Happying's S1 Appearance
            - paragraph [ref=e554]:
              - text: In
              - link "Catch! Teenieping" [ref=e556] [cursor=pointer]:
                - /url: /wiki/Catch!_Teenieping_(season)
              - text: ", Happying is a red sunshine-themed Teenieping that has a light-red body with a red collar with a golden button attached, and a white underbelly with a golden royal symbol. She has long eyelashes with teal irises on her eyes. She has a heart-shaped nose and a curvy mouth that resembles a cat's mouth."
            - paragraph [ref=e557]: She has a red tuft of hair resembling a heart attaching a bow on her head with a crown in the middle. She has red ear-like structures with a lighter red in the center resembling cat ears or resembling a chihuahua.
            - paragraph [ref=e558]: Her prop is a red-pinkish and yellow bubble gun.
            - heading "Season 6 Sign in to edit" [level=3] [ref=e559]:
              - text: Season 6
              - link "Sign in to edit" [ref=e561] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D3&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e562]
            - figure "Happying's S6 Appearance" [ref=e564]:
              - link "Happying's S6 Appearance view image" [ref=e565] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/9/90/Happying_S6_Render_2.png/revision/latest?cb=20260218211349
                - img "Happying's S6 Appearance" [ref=e566]
                - generic "view image" [ref=e569]:
                  - img [ref=e570]
              - paragraph [ref=e573]: Happying's S6 Appearance
            - paragraph [ref=e574]:
              - text: In
              - link "Princess Catch! Teenieping" [ref=e576] [cursor=pointer]:
                - /url: /wiki/Princess_Catch!_Teenieping
              - text: ", she now wears a silver-colored tiara with a yellow diamond. Her bow remains the same, but is now glittery."
            - paragraph [ref=e577]: She wears a red dress with thin white ruffled lines around her Royal Mark, and the bottom has a white ruffled hem. She also has a transparent pink collar that transitions into a cape, along with white leggings and red shoes.
            - heading "Monster Form Sign in to edit" [level=3] [ref=e578]:
              - text: Monster Form
              - link "Sign in to edit" [ref=e580] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D4&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e581]
            - figure "Happying's Monster Appearance" [ref=e583]:
              - link "Happying's Monster Appearance view image" [ref=e584] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/9/9c/Happying_Monster_Render_2.png/revision/latest?cb=20260218214013
                - img "Happying's Monster Appearance" [ref=e585]
                - generic "view image" [ref=e588]:
                  - img [ref=e589]
              - paragraph [ref=e592]: Happying's Monster Appearance
            - paragraph [ref=e593]: In her monster form, Happying has the same ears and hair, but without a crown. Her body is bigger and furrier with pinkish eyes and a red heart shaped nose.
            - paragraph [ref=e594]: She has beaver like teeth, yellow claws, white spots on her hands and feet, and a tail similar to a rabbit's tail. Her white patch is in a heart shape.
            - heading "Personality Sign in to edit" [level=2] [ref=e595]:
              - text: Personality
              - link "Sign in to edit" [ref=e597] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D5&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e598]
            - paragraph [ref=e600]:
              - text: Happying is kind, playful, and of course, happy. She is fond of bubbles, often seen playing with them or taking bubble baths. Happying is excitable and optimistic, and her bright nature brings hope to those who are down, shown in "
              - link "Princess Sunshine" [ref=e601] [cursor=pointer]:
                - /url: /wiki/Princess_Sunshine
              - text: "\", when she comforts"
              - link "Sighping" [ref=e602] [cursor=pointer]:
                - /url: /wiki/Sighping
              - text: .
            - paragraph [ref=e603]:
              - text: While she is cheerful and playful most of the time, Happying also has a serious side; she is determined, careful, and diligent when it comes to missions, as seen throughout
              - link "Twinkle Catch! Teenieping" [ref=e605] [cursor=pointer]:
                - /url: /wiki/Twinkle_Catch!_Teenieping
              - text: and in "
              - link "Spy Operation" [ref=e606] [cursor=pointer]:
                - /url: /wiki/Spy_Operation
              - text: "\"."
            - heading "Etymology Sign in to edit" [level=2] [ref=e607]:
              - text: Etymology
              - link "Sign in to edit" [ref=e609] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D6&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e610]
            - list [ref=e612]:
              - listitem [ref=e613]:
                - text: The Korean name 해핑 ("Haeping") comes from the Korean word "해", which means "sun". This ties in with her main concept.
                - list [ref=e614]:
                  - listitem [ref=e615]: Notably and coincidentally, "해핑" phonetically sounds like its English name, Happying. Had it been translated literally, it would've been "Sunping", but since the two words are phonetically similar, the localizers stuck with "Happying".
              - listitem [ref=e616]: The Chinese name 幸福萌可 ("Xìngfú méng kě") comes from 幸福 ("Xìngfú"), which means "happy". This word can also be used as 幸福感 ("Xìngfúgǎn"), which means "feeling of happiness".
              - listitem [ref=e617]: The Russian catchphrase Счастье ("Schast'ye") comes from Счастье ("Schast'ye"), which means "happiness".
            - heading "Magic Sign in to edit" [level=2] [ref=e618]:
              - text: Magic
              - link "Sign in to edit" [ref=e620] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D7&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e621]
            - heading "Transformation Sign in to edit" [level=3] [ref=e623]:
              - text: Transformation
              - link "Sign in to edit" [ref=e625] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D8&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e626]
            - figure "Romi transformed as Princess Sunshine" [ref=e628]:
              - link "Romi transformed as Princess Sunshine view image" [ref=e629] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/5/56/S1_-_Princess_Sunshine_pose.png/revision/latest?cb=20210817095919
                - img "Romi transformed as Princess Sunshine" [ref=e630]
                - generic "view image" [ref=e633]:
                  - img [ref=e634]
              - paragraph [ref=e637]: Romi transformed as Princess Sunshine
            - paragraph [ref=e638]:
              - text: By giving Romi a kiss, Happying can help her transform into a magical princess,
              - link "Princess Sunshine" [ref=e640] [cursor=pointer]:
                - /url: /wiki/Princesses
              - text: . When transformed, Romi gains physical strength, and can use the power of her various tools, create a protective shield, or to catch a Teenieping for example.
            - heading "Main Powers Sign in to edit" [level=3] [ref=e641]:
              - text: Main Powers
              - link "Sign in to edit" [ref=e643] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D9&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e644]
            - figure "The Royal Teeniepings in Happying's bubbles" [ref=e646]:
              - link "The Royal Teeniepings in Happying's bubbles view image" [ref=e647] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/d/df/S1E46_-_Royal_Teeniepings_in_Happying%27s_bubbles.png/revision/latest?cb=20230829181743
                - img "The Royal Teeniepings in Happying's bubbles" [ref=e648]
                - generic "view image" [ref=e651]:
                  - img [ref=e652]
              - paragraph [ref=e655]: The Royal Teeniepings in Happying's bubbles
            - paragraph [ref=e656]: Happying's prop is a bubble gun. She can use it to create small bubbles called the Bubbles of Happiness, that can trap objects or people it touches. The bubble, much stronger than any regular bubble (it will only break if it touches something), will then float for some time, before popping after a few minutes at most. As Happying can even control the bubbles' movements, she can use them as a means of transportation, as she is somewhat able to fly.
            - paragraph [ref=e657]:
              - text: Additionally, Happying can sprinkle
              - link "Tinkle Puff" [ref=e658] [cursor=pointer]:
                - /url: /wiki/Tinkle_Puff
              - text: able to make anyone it touches happy like her.
            - heading "Special Powers Sign in to edit" [level=3] [ref=e659]:
              - text: Special Powers
              - link "Sign in to edit" [ref=e661] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D10&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e662]
            - figure "Happying using her full royal power on Egoping" [ref=e664]:
              - link "Happying using her full royal power on Egoping view image" [ref=e665] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/1/1e/S1E51_-_Happying_using_her_full_royal_power_on_Egoping.png/revision/latest?cb=20230829181753
                - img "Happying using her full royal power on Egoping" [ref=e666]
                - generic "view image" [ref=e669]:
                  - img [ref=e670]
              - paragraph [ref=e673]: Happying using her full royal power on Egoping
            - paragraph [ref=e674]: Happying's golden chest, the sign of her being a Royal Teenieping, holds a powerful magic, that she can use when everything seems lost. However, if she uses all the energy she has, she can die in the process, making her whole body become gray. This ability is so powerful that it can create an explosion in the most extreme cases.
            - figure "Romi transferring her energy to Happying" [ref=e675]:
              - link "Romi transferring her energy to Happying view image" [ref=e676] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/e/eb/S1E52_-_Romi_transfering_her_energy_to_Happying.png/revision/latest?cb=20230829181755
                - img "Romi transferring her energy to Happying" [ref=e677]
                - generic "view image" [ref=e680]:
                  - img [ref=e681]
              - paragraph [ref=e684]: Romi transferring her energy to Happying
            - paragraph [ref=e685]: Additionally, the small crown she has on her head has a special telepathic connection with Romi, allowing Romi to transfer energy to Happying through the crown. It is an object made by Romi, which she made in order to help cure Happying's sickness.
            - heading "History Sign in to edit" [level=2] [ref=e686]:
              - text: History
              - link "Sign in to edit" [ref=e688] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D11&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e689]
            - heading "Mistake in the Emotions Kingdom Sign in to edit" [level=3] [ref=e691]:
              - text: Mistake in the Emotions Kingdom
              - link "Sign in to edit" [ref=e693] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D12&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e694]
            - paragraph [ref=e696]:
              - text: At some point in her life, Happying becomes a
              - link "Royal Teenieping" [ref=e697] [cursor=pointer]:
                - /url: /wiki/Royal_Teeniepings
              - text: . When Happying has caught an unknown sickness, Romi makes a magic crown for her to help cure her from it.
            - figure "Happying eating the Yummy Fruit" [ref=e698]:
              - link "Happying eating the view image" [ref=e699] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/e/ea/S1E45_-_Happying_eating_the_Yummy_Fruit.png/revision/latest?cb=20230121134526
                - img "Happying eating the" [ref=e700]
                - generic "view image" [ref=e703]:
                  - img [ref=e704]
              - paragraph [ref=e707]:
                - text: Happying eating the
                - link "Yummy Fruit" [ref=e708] [cursor=pointer]:
                  - /url: /wiki/Yummy_Fruit
            - paragraph [ref=e709]:
              - text: One day, in the Emotions Kingdom, she gets guided by her curiosity and
              - link "Egoping" [ref=e710] [cursor=pointer]:
                - /url: /wiki/Egoping
              - text: "'s voice, making her enter the"
              - link "greenhouse" [ref=e711] [cursor=pointer]:
                - /url: /wiki/Greenhouse
              - text: and eat the
              - link "Yummy Fruit" [ref=e712] [cursor=pointer]:
                - /url: /wiki/Yummy_Fruit
              - text: ", turning her into her evil ego,"
              - link "Giggleping" [ref=e713] [cursor=pointer]:
                - /url: /wiki/Giggleping
              - text: . She has a completely different appearance, with only elements such as her fringe or her little crown on her bow. Still guided by the voice, she goes into the Cube Chamber and starts manipulating some buttons, before
              - link "Romi" [ref=e714] [cursor=pointer]:
                - /url: /wiki/Romi
              - text: enters, led by her evil force, and accidentally presses a button that frees all the
              - link "Teeniepings" [ref=e715] [cursor=pointer]:
                - /url: /wiki/Teeniepings
              - text: of the chamber.
            - figure "Giggleping getting released on Earth" [ref=e716]:
              - link "Giggleping getting released on Earth view image" [ref=e717] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/9/9a/S1E51_-_Giggleping_going_on_Earth.png/revision/latest?cb=20230829181744
                - img "Giggleping getting released on Earth" [ref=e718]
                - generic "view image" [ref=e721]:
                  - img [ref=e722]
              - paragraph [ref=e725]: Giggleping getting released on Earth
            - paragraph [ref=e726]: She then gets carried away by the magic, when she suddenly gets immobilized by Egoping's magic, the latter wishing her good luck before releasing her with the other Teeniepings.
            - 'heading "Season 1: Cameos and Final Relief Sign in to edit" [level=3] [ref=e727]':
              - generic [ref=e728]:
                - link "Season 1" [ref=e729] [cursor=pointer]:
                  - /url: /wiki/Catch!_Teenieping_(season)
                - text: ": Cameos and Final Relief"
              - link "Sign in to edit" [ref=e731] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D13&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e732]
            - paragraph [ref=e734]:
              - text: Romi's mission then takes place, and she tends to be forgotten by her colleagues (especially
              - link "Gogoping" [ref=e735] [cursor=pointer]:
                - /url: /wiki/Gogoping
              - text: "who doesn't even remember her name), but not by Romi: in \""
              - link "Don't Look at the Mirror!" [ref=e736] [cursor=pointer]:
                - /url: /wiki/Don%27t_Look_at_the_Mirror!
              - text: "\", she is seen for the first time in one of Romi's memories of her time at the Emotions Kingdom."
            - figure "Romi's strange encounter with Happying" [ref=e737]:
              - link "Romi's strange encounter with Happying view image" [ref=e738] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/b/b0/S1E27_-_Romi_dreaming_of_Happying.png/revision/latest?cb=20230829181737
                - img "Romi's strange encounter with Happying" [ref=e739]
                - generic "view image" [ref=e742]:
                  - img [ref=e743]
              - paragraph [ref=e746]: Romi's strange encounter with Happying
            - paragraph [ref=e747]:
              - text: In "
              - link "Likey the Pranks, Giggleping!" [ref=e748] [cursor=pointer]:
                - /url: /wiki/Likey_the_Pranks,_Giggleping!
              - text: "\", Romi makes her a dream of her and explains her concerns of not finding her to the other Royal Teeniepings. Meanwhile, her evil alter-ego Giggleping makes her arrival on Earth and starts to make Romi's mission way more difficult."
            - paragraph [ref=e749]:
              - text: Similarly, in "
              - link "Teenieping Carnival" [ref=e750] [cursor=pointer]:
                - /url: /wiki/Teenieping_Carnival
              - text: "\", Romi ends up talking to Giggleping of Happying. Saddened about not seeing her dear friend for so long, she starts to cry, and she perceives Happying walking away near the"
              - link "bakery" [ref=e751] [cursor=pointer]:
                - /url: /wiki/Heartrose_Bakery
              - text: . However, she soon realizes that it is only an illusion.
            - figure "Giggleping getting freed of the Yummy Fruit's seed" [ref=e752]:
              - link "Giggleping getting freed of the Yummy Fruit's seed view image" [ref=e753] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/9/92/S1E45_-_Giggleping_getting_freed_of_the_Matna_seed.png/revision/latest?cb=20230829181738
                - img "Giggleping getting freed of the Yummy Fruit's seed" [ref=e754]
                - generic "view image" [ref=e757]:
                  - img [ref=e758]
              - paragraph [ref=e761]: Giggleping getting freed of the Yummy Fruit's seed
            - paragraph [ref=e762]:
              - text: Then, in "
              - link "Happying's Back" [ref=e763] [cursor=pointer]:
                - /url: /wiki/Happying%27s_Back
              - text: "\", the truth is finally unveiled: Giggleping loses the little badge she carries, and, after an investigation, the Teeniepings notice that this badge contains some pollen from the Yummy Fruit, a magical fruit that only grows in the greenhouse in the castle Romi previously lived in."
            - paragraph [ref=e764]:
              - link "Dr. Monziu" [ref=e765] [cursor=pointer]:
                - /url: /wiki/Dr._Monziu
              - text: tells Romi that the Yummy Fruit can completely change a Teenieping. A while later, after once again dreaming of Happying, Romi accidentally knocks the badge onto the floor. The badge spins upon falling as it flashes back and forth to a teenieping being told to eat the Yummy Fruit, and Giggleping being in pain. When the badge stops spinning it quickly flashes back and forth from the badge, which is now upside-down, to Happying's crown. Eventually, the image of Happying's crown zooms out, showing Happying eating the Yummy Fruit. Romi realizes the badge was actually Happying's crown all along, and that Giggleping is Happying.
            - paragraph [ref=e766]:
              - text: Meanwhile, Giggleping is weakened by the loss of the crown. Determined to save her,
              - link "Princess Heart" [ref=e767] [cursor=pointer]:
                - /url: /wiki/Princesses
              - text: starts to fight Giggleping; after finally reaching her, she kisses the crown, which turns back to her normal form, and puts it on Giggleping, allowing the latter to spit the Yummy Fruit's seed out and to transform back into her normal form. As Happying, she slowly realizes everything that happened, while Romi bursts into tears of joy.
            - figure "Happying and Sighping" [ref=e768]:
              - link "Happying and Sighping view image" [ref=e769] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/b/b0/S1E46_-_Happying_and_Sighping.png/revision/latest?cb=20230829181740
                - img "Happying and Sighping" [ref=e770]
                - generic "view image" [ref=e773]:
                  - img [ref=e774]
              - paragraph [ref=e777]: Happying and Sighping
            - paragraph [ref=e778]:
              - text: Then, she stays with Romi and the other Royal Teeniepings to catch the last few Teeniepings. She often helps Romi transform into Princess Sunshine, possibly because she was unable to transform with Romi for the majority of the season. Everything is back just like before, as she likes to take bubble baths and have fun playing with her friends, as seen in the episode
              - link "\"Princess Sunshine" [ref=e779] [cursor=pointer]:
                - /url: /wiki/Princess_Sunshine
              - text: "\". Her ability to always be happy helps during some catching missions, especially when she comforts"
              - link "Sighping" [ref=e780] [cursor=pointer]:
                - /url: /wiki/Sighping
              - text: .
            - figure "Happying sacrificing herself to save Romi" [ref=e781]:
              - link "Happying sacrificing herself to save Romi view image" [ref=e782] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/7/71/S1E51_-_Happying_creating_a_big_explosion.png/revision/latest?cb=20230829181751
                - img "Happying sacrificing herself to save Romi" [ref=e783]
                - generic "view image" [ref=e786]:
                  - img [ref=e787]
              - paragraph [ref=e790]: Happying sacrificing herself to save Romi
            - paragraph [ref=e791]:
              - text: In "
              - link "In The Name Of The Royalpings" [ref=e792] [cursor=pointer]:
                - /url: /wiki/In_The_Name_Of_The_Royalpings
              - text: "\", when Egoping manages to steal the"
              - link "Magic Catcher" [ref=e793] [cursor=pointer]:
                - /url: /wiki/Magic_Catcher
              - text: and everything seems lost, she decides to use the power of the Royal Symbol (the golden crown-shaped symbol every Royal Teenieping has on their belly) to save Romi, as she remembers the happy times they have spent together and how she was impressed by her as Giggleping. She hugs Egoping, which creates a big explosion, and sadly, she dies as she has no energy left.
            - paragraph [ref=e794]:
              - text: In "
              - link "Princess Veronica" [ref=e795] [cursor=pointer]:
                - /url: /wiki/Princess_Veronica
              - text: "\" Romi bursts into tears and tries to resuscitate her using the magic of her little crown, but it fails. Then, Egoping reappears, as Happying's magic is not powerful enough to stop her. She traps Romi and the Royal Teeniepings into her evil ball, when suddenly Heartsping's tear magic activates, which transforms Romi into"
              - link "Princess Veronica" [ref=e796] [cursor=pointer]:
                - /url: /wiki/Princesses
              - text: and resuscitates Happying. They then defeat Egoping with the combined power of all the Royal Teeniepings working together.
            - 'heading "Season 2: Leading the Investigation Sign in to edit" [level=3] [ref=e797]':
              - generic [ref=e798]:
                - link "Season 2" [ref=e799] [cursor=pointer]:
                  - /url: /wiki/Twinkle_Catch!_Teenieping
                - text: ": Leading the Investigation"
              - link "Sign in to edit" [ref=e801] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D14&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e802]
            - paragraph [ref=e804]:
              - text: In
              - link "Twinkle Catch! Teenieping" [ref=e806] [cursor=pointer]:
                - /url: /wiki/Twinkle_Catch!_Teenieping
              - text: ", Happying returns to the Emotions Kingdom to become a teacher of the"
              - link "Royal Teenieping School" [ref=e807] [cursor=pointer]:
                - /url: /wiki/Royal_Teenieping_School
              - text: ", along with the other Royal Teeniepings (excluding"
              - link "Heartsping" [ref=e808] [cursor=pointer]:
                - /url: /wiki/Heartsping
              - text: ", who stays with Romi). In \""
              - link "Twinkle Twinkle Jewel Teeniepings" [ref=e809] [cursor=pointer]:
                - /url: /wiki/Twinkle_Twinkle,_Jewel_Teeniepings
              - text: "\", when"
              - link "Maskping" [ref=e810] [cursor=pointer]:
                - /url: /wiki/Maskping
              - text: attacks, she quickly arrives in the
              - link "Jewel Forest" [ref=e811] [cursor=pointer]:
                - /url: /wiki/Jewel_Forest
              - text: with the other Royal Teeniepings, and she gets surprised when she sees the new villain Teenieping.
            - paragraph [ref=e812]: Later, she decides to lead the investigation to find the true identity of Maskping. She leaves her role of teacher to carry out the investigation full-time, which causes her to be missing during many events.
            - figure "Happying coming face to face with Maskping" [ref=e813]:
              - link "Happying coming face to face with Maskping view image" [ref=e814] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/d/d4/S2E15_-_Maskping_stopped_by_Happying.png/revision/latest?cb=20230121111949
                - img "Happying coming face to face with Maskping" [ref=e815]
                - generic "view image" [ref=e818]:
                  - img [ref=e819]
              - paragraph [ref=e822]: Happying coming face to face with Maskping
            - paragraph [ref=e823]:
              - text: Her hard work eventually pays off, as she finds an obsidian bomb left by Maskping in the Jewel Forest in "
              - link "Another Princess" [ref=e824] [cursor=pointer]:
                - /url: /wiki/Another_Princess
              - text: "\", and even comes face to face with her in \""
              - link "Royal Teeniepings' Face-Off!" [ref=e825] [cursor=pointer]:
                - /url: /wiki/Royal_Teenieping_Face-Off!
              - text: "\": as Maskping about to travel somewhere, Happying interrupts her and asks her to surrender. A fight begins, and Maskping even pulls off her mask; however, the clever use of her mask magic allows her to counter Happying's attack, allowing her to escape."
            - figure "Happying warning the Royal Teeniepings" [ref=e826]:
              - link "Happying warning the Royal Teeniepings view image" [ref=e827] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/catchteeniepin/images/2/26/S2E25_-_Happying_warning_the_Royal_Teeniepings.png/revision/latest?cb=20230829181756
                - img "Happying warning the Royal Teeniepings" [ref=e828]
                - generic "view image" [ref=e831]:
                  - img [ref=e832]
              - paragraph [ref=e835]: Happying warning the Royal Teeniepings
            - paragraph [ref=e836]:
              - text: Finally, while all the Royal Teeniepings go to the Teenieping School Graduation (during the events of "
              - link "Teenieping School Graduation" [ref=e837] [cursor=pointer]:
                - /url: /wiki/Teenieping_School_Graduation
              - text: "\"), she rummages once again into the Jewel Forest, and finds Maskping's hiding place. She sees her costume and some obsidian bombs, when she suddenly gets hit by"
              - link "Onlyping" [ref=e838] [cursor=pointer]:
                - /url: /wiki/Onlyping
              - text: ", who was not wearing her costume. She hurriedly goes on Earth to inform the Royal Teeniepings of what happened, but when she arrives, in \""
              - link "Heartsping in Danger" [ref=e839] [cursor=pointer]:
                - /url: /wiki/Heartsping_in_Danger
              - text: "\", Romi already escaped with"
              - link "Jenny" [ref=e840] [cursor=pointer]:
                - /url: /wiki/Jenny
              - text: . She tells everything to the others, and the students Teeniepings decide to go save Romi.
            - 'heading "Season 6: TBA Sign in to edit" [level=3] [ref=e841]':
              - generic [ref=e842]:
                - link "Season 6" [ref=e843] [cursor=pointer]:
                  - /url: /wiki/Princess_Catch!_Teenieping
                - text: ": TBA"
              - link "Sign in to edit" [ref=e845] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D15&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e846]
            - heading "Spy Operation Sign in to edit" [level=4] [ref=e848]:
              - link "Spy Operation" [ref=e850] [cursor=pointer]:
                - /url: /wiki/Spy_Operation
              - link "Sign in to edit" [ref=e852] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D16&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e853]
            - paragraph [ref=e855]:
              - text: Happying is sent by
              - link "Dr. Monziu" [ref=e856] [cursor=pointer]:
                - /url: /wiki/Dr._Monziu
              - text: to find the castle in the Dark Forest and rescue
              - link "Dianaping" [ref=e857] [cursor=pointer]:
                - /url: /wiki/Dianaping
              - text: . She climbs into a small plane and heads out on her mission. Along the way, she finds out that
              - link "Fluffyping" [ref=e858] [cursor=pointer]:
                - /url: /wiki/Fluffyping
              - text: fell asleep on the plane without telling anyone, but it's too late to go back.
            - paragraph [ref=e859]:
              - text: When they reach the
              - link "Dark Forest" [ref=e860] [cursor=pointer]:
                - /url: /wiki/Dark_Forest
              - text: ", the castle shoots magic blasts at them, and the plane crashes. Happying and Fluffyping jump out just in time. Happying wants Fluffyping to stay behind, but Fluffyping is too scared, so Happying takes her along."
            - paragraph [ref=e861]:
              - text: They sneak toward the castle. Happying tries to climb the wall quietly, but Fluffyping reaches the top first and sets off a trap. During the chaos, the two get separated. Happying ends up in a room full of mirrors, where she meets the
              - link "Mirror Spirit" [ref=e862] [cursor=pointer]:
                - /url: /wiki/Mirror_Spirit
              - text: . She demands to know where Dianaping is.
            - paragraph [ref=e863]:
              - link "Eclipseping" [ref=e864] [cursor=pointer]:
                - /url: /wiki/Eclipseping
              - text: appears, and Happying tells her that she is a secret agent. She starts to fight Eclipseping, and uses her speed and bubble gun, but Eclipseping's magic is more powerful. Eclipseping threatens to trap Happying in a mirror; however, Fluffyping intervenes and rescues Happying.
            - paragraph [ref=e865]: "Both of them flee from the castle and fly away on Fluffyping's hot air balloon. Though they weren't able to save Dianaping, Happying reflects that they gained a lot from their adventure: locating the castle, witnessing how terrifying Eclipseping is, and understanding what awaits them."
            - heading "The Spinning Mirror Sign in to edit" [level=4] [ref=e866]:
              - link "The Spinning Mirror" [ref=e868] [cursor=pointer]:
                - /url: /wiki/The_Spinning_Mirror
              - link "Sign in to edit" [ref=e870] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D17&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e871]
            - paragraph [ref=e873]: TBA
            - heading "Trivia Sign in to edit" [level=2] [ref=e874]:
              - text: Trivia
              - link "Sign in to edit" [ref=e876] [cursor=pointer]:
                - /url: https://auth.fandom.com/signin?redirect=https%3A%2F%2Fcatchteenieping.fandom.com%2Fwiki%2FHappying%3Fveaction%3Dedit%26section%3D18&uselang=en&metadata=article-registration-edit-article-section
                - img [ref=e877]
            - list [ref=e879]:
              - listitem [ref=e880]:
                - text: She is one of the two only Teeniepings that does not have "p" in ping as the word "happy" overlaps the "ping" part.
                - list [ref=e881]:
                  - listitem [ref=e882]:
                    - text: "However, that is not the case in the Korean version, as she is simply named \"Happing\": her particularity therefore is to only have one syllable in her name, along with"
                    - link "Muffping" [ref=e883] [cursor=pointer]:
                      - /url: /wiki/Muffping
                    - text: and
                    - link "Cupping" [ref=e884] [cursor=pointer]:
                      - /url: /wiki/Cupping
                    - text: .
              - listitem [ref=e885]: Along with her multiple cameos, Happying also appears in the ending credits of the second part of the season, starting from her true introductory episode, "Likey the Pranks, Giggleping!"
              - listitem [ref=e886]: Happying is the first known Teenieping to eat the Yummy Fruit.
              - listitem [ref=e887]:
                - text: Happying is the second known detective in the
                - link "series" [ref=e888] [cursor=pointer]:
                  - /url: /wiki/Catch!_Teenieping_(series)
                - text: . The first was
                - link "Dadaping" [ref=e889] [cursor=pointer]:
                  - /url: /wiki/Dadaping
                - text: .
              - listitem [ref=e890]:
                - text: Happying has been transformed twice by an evil Teenieping during the entire Catch! Teenieping franchise.
                - list [ref=e891]:
                  - listitem [ref=e892]:
                    - text: Chronologically, she was first transformed into a large monster by
                    - link "Truthping" [ref=e893] [cursor=pointer]:
                      - /url: /wiki/Truthping
                    - text: in the prequel movie,
                    - 'link "Heartsping: Teenieping of Love" [ref=e894] [cursor=pointer]':
                      - /url: /wiki/Heartsping:_Teenieping_of_Love
                    - text: ", and then for the second time she was transformed into an evil Teenieping named"
                    - link "Giggleping" [ref=e895] [cursor=pointer]:
                      - /url: /wiki/Giggleping
                    - text: by
                    - link "Egoping" [ref=e896] [cursor=pointer]:
                      - /url: /wiki/Egoping
                    - text: in the first season.
                  - listitem [ref=e897]:
                    - link "Twinkle Catch! Teenieping" [ref=e899] [cursor=pointer]:
                      - /url: /wiki/Twinkle_Catch!_Teenieping
                    - text: is so far the only Catch! Teenieping incarnation that Happying appears in where she did not get transformed by an evil Teenieping.
              - listitem [ref=e900]:
                - text: Happying is the first Teenieping to nearly die after a sacrifice; the later two Teeniepings to nearly die are
                - link "Sweetping" [ref=e901] [cursor=pointer]:
                  - /url: /wiki/Sweetping
                - text: and
                - link "Tangyping" [ref=e902] [cursor=pointer]:
                  - /url: /wiki/Tangyping
                - text: in
                - link "Season 4" [ref=e903] [cursor=pointer]:
                  - /url: /wiki/Dessert_Catch!_Teenieping
                - text: .
              - listitem [ref=e904]: She notably sounds older in the Russian dub.
              - listitem [ref=e905]:
                - text: She's the first Teenieping who's Korean name consists of only 2 syllables instead of the usual 3 syllables.
                - list [ref=e906]:
                  - listitem [ref=e907]: However, she's the first Royal Teenieping to have this trait.
              - listitem [ref=e908]:
                - text: Despite being a Royal Teenieping, Happying's QR variable name is "Fairy 24" in the
                - link "Magic Catcher toy" [ref=e909] [cursor=pointer]:
                  - /url: /wiki/Magic_Catcher/Merchandise
                - text: ", instead of \"Fairy 06\" to follow Royal Teenieping consecutively, as it is taken by"
                - link "Shyping" [ref=e910] [cursor=pointer]:
                  - /url: /wiki/Shyping
                - text: .
