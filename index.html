<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>캐치! 티니핑 메모리게임</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: linear-gradient(135deg, #FFB3D9 0%, #C5A8FF 50%, #A8D8FF 100%);
      min-height: 100vh;
    }

    /* ─── Start Screen ─── */
    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 20px;
    }

    .game-title {
      font-size: clamp(1.8rem, 7vw, 2.8rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 2px 2px 0 #FF69B4, 5px 5px 0 rgba(0,0,0,0.1);
      margin-bottom: 6px;
    }

    .game-subtitle {
      color: rgba(255,255,255,0.9);
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 40px;
      letter-spacing: 0.12em;
    }

    .diff-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(90px, 140px));
      gap: 14px;
    }

    .diff-card {
      background: #fff;
      border-radius: 22px;
      padding: 22px 12px 18px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      border: 3px solid transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .diff-card:hover  { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.18); }
    .diff-card:active { transform: scale(0.96); }
    .diff-card.easy   { border-color: #6EE7A0; }
    .diff-card.medium { border-color: #FFD166; }
    .diff-card.hard   { border-color: #FF6B9D; }

    .diff-icon  { font-size: 2.2rem; margin-bottom: 8px; }
    .diff-label { font-size: 1.05rem; font-weight: 900; color: #333; }
    .diff-sub   { font-size: 0.72rem; color: #aaa; margin: 4px 0 10px; }
    .diff-best  { font-size: 0.72rem; font-weight: 700; color: #FF69B4; min-height: 1em; }

    /* ─── Game Screen ─── */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 14px 12px 24px;
    }

    .hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.92);
      border-radius: 18px;
      padding: 10px 18px;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    .hud-stat { text-align: center; }
    .hud-label { font-size: 0.58rem; font-weight: 700; color: #ccc; text-transform: uppercase; letter-spacing: 0.06em; }
    .hud-val   { font-size: 1.15rem; font-weight: 900; color: #333; }

    .btn-home {
      background: linear-gradient(135deg, #FF85C2, #FF1493);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-home:hover  { opacity: 0.85; }
    .btn-home:active { transform: scale(0.94); }

    /* ─── Grid ─── */
    #grid {
      display: grid;
      gap: 8px;
      width: 100%;
    }

    /* ─── Card ─── */
    .card {
      aspect-ratio: 3 / 4;
      cursor: pointer;
      perspective: 900px;
      -webkit-tap-highlight-color: transparent;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.48s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-back,
    .card-front {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    /* Pattern side (face-down) */
    .card-back {
      background: linear-gradient(135deg, #FF85C2 0%, #C77DFF 100%);
      box-shadow: 0 3px 10px rgba(0,0,0,0.18);
    }
    .card-back::before {
      content: '💫';
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      opacity: 0.5;
    }

    /* Character side (face-up) */
    .card-front {
      transform: rotateY(180deg);
      box-shadow: 0 3px 10px rgba(0,0,0,0.18);
    }

    .card-img {
      width: 80%;
      height: 75%;
      object-fit: contain;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.25));
    }
    .card-emoji-fallback { font-size: clamp(1.5rem, 5vw, 2.4rem); }
    .card-name  {
      font-size: clamp(0.55rem, 1.8vw, 0.78rem);
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
      margin-top: 4px;
    }

    .card.matched .card-front {
      animation: card-pop 0.35s ease both;
    }
    @keyframes card-pop {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.1); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    /* ─── Win Modal ─── */
    #win-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #win-modal.show { display: flex; }

    .win-box {
      background: #fff;
      border-radius: 28px;
      padding: 36px 28px 28px;
      text-align: center;
      width: min(340px, 88vw);
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
      animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes pop-in {
      from { transform: scale(0.6) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0);      opacity: 1; }
    }

    .win-icon  { font-size: 3.5rem; margin-bottom: 6px; }
    .win-title { font-size: 1.7rem; font-weight: 900; color: #FF1493; }
    .win-msg   { font-size: 0.88rem; color: #bbb; margin: 4px 0 18px; }

    .record-badge {
      display: inline-block;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 900;
      padding: 6px 18px;
      border-radius: 99px;
      margin-bottom: 16px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 22px;
    }
    .result-cell  { background: #FFF0F7; border-radius: 14px; padding: 12px 8px; }
    .result-label { font-size: 0.68rem; color: #ccc; font-weight: 700; }
    .result-val   { font-size: 1.4rem; font-weight: 900; color: #FF69B4; }

    .win-actions { display: flex; gap: 10px; }

    .btn-primary,
    .btn-ghost {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 13px 10px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary { background: linear-gradient(135deg, #FF85C2, #FF1493); color: #fff; }
    .btn-ghost   { background: #F4F4F4; color: #555; }
    .btn-primary:hover, .btn-ghost:hover  { opacity: 0.85; }
    .btn-primary:active, .btn-ghost:active { transform: scale(0.96); }
  </style>
</head>
<body>

<!-- ─── Start Screen ─── -->
<div id="start-screen">
  <h1 class="game-title">💖 캐치! 티니핑</h1>
  <p class="game-subtitle">메모리 카드 게임</p>

  <div class="diff-cards">
    <div class="diff-card easy" onclick="startGame('easy')">
      <div class="diff-icon">🌱</div>
      <div class="diff-label">쉬움</div>
      <div class="diff-sub">12장 · 6쌍</div>
      <div class="diff-best" id="best-easy"></div>
    </div>
    <div class="diff-card medium" onclick="startGame('medium')">
      <div class="diff-icon">⭐</div>
      <div class="diff-label">보통</div>
      <div class="diff-sub">16장 · 8쌍</div>
      <div class="diff-best" id="best-medium"></div>
    </div>
    <div class="diff-card hard" onclick="startGame('hard')">
      <div class="diff-icon">🔥</div>
      <div class="diff-label">어려움</div>
      <div class="diff-sub">20장 · 10쌍</div>
      <div class="diff-best" id="best-hard"></div>
    </div>
  </div>
</div>

<!-- ─── Game Screen ─── -->
<div id="game-screen">
  <div class="hud">
    <div class="hud-stat">
      <div class="hud-label">시간</div>
      <div class="hud-val" id="hud-time">0:00</div>
    </div>
    <div class="hud-stat">
      <div class="hud-label">뒤집기</div>
      <div class="hud-val" id="hud-moves">0</div>
    </div>
    <div class="hud-stat">
      <div class="hud-label">최고기록</div>
      <div class="hud-val" id="hud-best">-</div>
    </div>
    <button class="btn-home" onclick="goHome()">처음으로</button>
  </div>

  <div id="grid"></div>
</div>

<!-- ─── Win Modal ─── -->
<div id="win-modal">
  <div class="win-box">
    <div class="win-icon">🎉</div>
    <div class="win-title">완성!</div>
    <div class="win-msg">모든 티니핑을 찾았어요!</div>
    <div id="record-badge" class="record-badge" hidden>🏆 신기록!</div>
    <div class="result-grid">
      <div class="result-cell">
        <div class="result-label">시간</div>
        <div class="result-val" id="res-time">-</div>
      </div>
      <div class="result-cell">
        <div class="result-label">뒤집기</div>
        <div class="result-val" id="res-moves">-</div>
      </div>
    </div>
    <div class="win-actions">
      <button class="btn-primary" onclick="restartGame()">다시하기</button>
      <button class="btn-ghost"  onclick="goHome()">난이도 변경</button>
    </div>
  </div>
</div>

<script>
const BASE = 'https://static.wikia.nocookie.net/catchteeniepin/images';
const CHARS = [
  { name:'하츄핑',   emoji:'💖', from:'#FF69B4', to:'#FF1493', img:`${BASE}/3/3b/Heartsping_S1_Render_1.png/revision/latest?cb=20240602044610` },
  { name:'다다핑',   emoji:'☁️', from:'#87CEEB', to:'#4682B4', img:`${BASE}/5/51/Dadaping_Render_1.png/revision/latest?cb=20220114163613` },
  { name:'고고핑',   emoji:'⭐', from:'#FFD700', to:'#FFA500', img:`${BASE}/0/04/Gogoping_Render_1.png/revision/latest?cb=20220114163807` },
  { name:'차차핑',   emoji:'🌿', from:'#90EE90', to:'#228B22', img:`${BASE}/7/7e/Chachaping_Render_1.png/revision/latest?cb=20260304171737` },
  { name:'랄라핑',   emoji:'🎵', from:'#DDA0DD', to:'#9932CC', img:`${BASE}/5/58/Lalaping_Render_1.png/revision/latest?cb=20220114163745` },
  { name:'해피핑',   emoji:'☀️', from:'#FFE066', to:'#FFB300', img:`${BASE}/5/58/Happying_S1_Render_1.png/revision/latest?cb=20260218204457` },
  { name:'조아핑',   emoji:'💚', from:'#66CDAA', to:'#2E8B57', img:`${BASE}/1/1e/Joahping_Render_1.png/revision/latest?cb=20210920174248` },
  { name:'티히핑',   emoji:'💎', from:'#FF6B6B', to:'#C0392B', img:`${BASE}/9/9a/Teeheeping_Render_1.png/revision/latest?cb=20210920174255` },
  { name:'트러스핑', emoji:'💙', from:'#6BAED6', to:'#2171B5', img:`${BASE}/d/d9/Trustping_Render_1.png/revision/latest?cb=20210920174301` },
  { name:'럭키핑',   emoji:'🍀', from:'#B8E994', to:'#27AE60', img:`${BASE}/f/fd/Luckyping_Render_1.png/revision/latest?cb=20230602134303` },
];

const DIFFS = {
  easy:   { cols: 4, pairs: 6  },
  medium: { cols: 4, pairs: 8  },
  hard:   { cols: 5, pairs: 10 },
};

let state = {};

const $ = id => document.getElementById(id);

function fmt(s) {
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function getBest(d) {
  const v = localStorage.getItem('tiniping_best_' + d);
  return v ? JSON.parse(v) : null;
}

function setBest(d, time, moves) {
  localStorage.setItem('tiniping_best_' + d, JSON.stringify({ time, moves }));
}

function renderBests() {
  ['easy', 'medium', 'hard'].forEach(d => {
    const b = getBest(d);
    $('best-' + d).textContent = b ? `최고: ${fmt(b.time)} · ${b.moves}회` : '기록 없음';
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame(diff) {
  const { cols, pairs } = DIFFS[diff];

  clearInterval(state.timer);

  state = {
    diff, pairs,
    flipped: [],
    matched: 0,
    moves: 0,
    seconds: 0,
    lock: false,
    started: false,
    timer: null,
  };

  $('start-screen').style.display = 'none';
  $('game-screen').style.display = 'flex';

  // Build deck: pairs × 2, shuffled
  const deck = shuffle([...CHARS.slice(0, pairs), ...CHARS.slice(0, pairs)]);

  const gridEl = $('grid');
  const maxW = cols <= 4 ? 420 : 500;
  gridEl.style.cssText = `grid-template-columns:repeat(${cols},1fr);max-width:${maxW}px`;
  gridEl.innerHTML = '';

  deck.forEach(char => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.char = char.name;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-back"></div>
        <div class="card-front" style="background:linear-gradient(135deg,${char.from},${char.to})">
          <img class="card-img" src="${char.img}" alt="${char.name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <div class="card-emoji-fallback" style="display:none">${char.emoji}</div>
          <div class="card-name">${char.name}</div>
        </div>
      </div>`;
    el.addEventListener('click', () => onCardClick(el));
    gridEl.appendChild(el);
  });

  $('hud-time').textContent  = '0:00';
  $('hud-moves').textContent = '0';
  const b = getBest(diff);
  $('hud-best').textContent = b ? fmt(b.time) : '-';
}

function onCardClick(card) {
  if (state.lock) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (state.flipped.length >= 2) return;

  // Start timer on first flip
  if (!state.started) {
    state.started = true;
    state.timer = setInterval(() => {
      state.seconds++;
      $('hud-time').textContent = fmt(state.seconds);
    }, 1000);
  }

  card.classList.add('flipped');
  state.flipped.push(card);

  if (state.flipped.length < 2) return;

  state.moves++;
  $('hud-moves').textContent = state.moves;
  state.lock = true;

  const [a, b] = state.flipped;

  if (a.dataset.char === b.dataset.char) {
    // Match!
    setTimeout(() => {
      a.classList.add('matched');
      b.classList.add('matched');
      state.flipped = [];
      state.matched++;
      state.lock = false;

      if (state.matched === state.pairs) {
        clearInterval(state.timer);
        setTimeout(showWin, 450);
      }
    }, 200);
  } else {
    // No match — flip back
    setTimeout(() => {
      a.classList.remove('flipped');
      b.classList.remove('flipped');
      state.flipped = [];
      state.lock = false;
    }, 950);
  }
}

function showWin() {
  const { diff, seconds, moves } = state;

  $('res-time').textContent  = fmt(seconds);
  $('res-moves').textContent = moves + '회';

  const prev  = getBest(diff);
  const isNew = !prev
    || seconds < prev.time
    || (seconds === prev.time && moves < prev.moves);

  if (isNew) setBest(diff, seconds, moves);
  $('record-badge').hidden = !isNew;

  $('win-modal').classList.add('show');
}

function restartGame() {
  $('win-modal').classList.remove('show');
  startGame(state.diff);
}

function goHome() {
  clearInterval(state.timer);
  $('win-modal').classList.remove('show');
  $('game-screen').style.display = 'none';
  $('start-screen').style.display = 'flex';
  renderBests();
}

// Init
renderBests();
</script>
</body>
</html>
